<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>投票 - レイアウト完全固定＆全画面バランス調整版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f6f9;
  --card-bg: #ffffff;
  --text: #2c3e50;
  --text-light: #64748b;
  --muted: #cbd5e1;
  --grid-line: #e2e8f0;
  --c-a: #ec407a;
  --c-b: #2980b9;
  --c-c: #27ae60;
  --c-d: #f39c12;
  --shadow: 0 10px 40px rgba(0,0,0,0.06);
}

body {
  font-family: 'Noto Sans JP', sans-serif;
  background: var(--bg);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  touch-action: pan-x pan-y;
  -webkit-user-select: none; user-select: none;
}

.wrap { width: 100vw; max-width: 100vw; aspect-ratio: 16/9; max-height: 100vh; padding: 2vw; }
.card {
  background: var(--card-bg); width: 100%; height: 100%;
  border-radius: 24px; box-shadow: var(--shadow); padding: 3% 4%;
  display: flex; flex-direction: column; position: relative; overflow: hidden;
}

.screen {
  display: none; flex-direction: column; flex: 1; width: 100%; height: 100%;
  opacity: 0; transition: opacity 0.4s ease;
}
.screen.show { display: flex; opacity: 1; }

/* ── 1. 投票画面 ── */
#s-vote { justify-content: space-between; }
.q-head { text-align: center; margin-top: 2vh; }
.q-number { font-size: clamp(14px, 1.8vw, 24px); font-weight: 900; color: var(--muted); letter-spacing: 0.1em; }
.q-title { font-size: clamp(24px, 3.5vw, 48px); font-weight: 900; color: var(--text); line-height: 1.3; white-space: pre-line; margin-top: 1vh;}

.choices-wrap { display: flex; justify-content: center; align-items: center; flex: 1; }

/* ── 画面下部のカウント ── */
.bottom-area {
  display: flex; flex-direction: column; align-items: center; gap: 1.5vh;
  margin-top: 2vh; position: relative;
}
.live-counts-container {
  display: flex; align-items: center; justify-content: center;
  width: 100%; padding: 1.5vh 0;
  border-top: 2px solid var(--grid-line);
}
.live-counts { display: flex; gap: 3vw; align-items: center; justify-content: center; }
.live-count-item { font-size: clamp(18px, 2.5vw, 36px); font-weight: 900; transition: transform 0.1s; display:flex; align-items:stretch; gap:0; border: 2px solid var(--grid-line); border-radius: 8px; overflow: hidden;}
.live-count-item .lc-letter { padding: 0.3em 0.5em; border-right: 2px solid var(--grid-line); display:flex; align-items:center; }
.live-count-item .lc-num { padding: 0.3em 0.6em; display:flex; align-items:baseline; gap:0.2em; }
.live-count-item small { font-size: 0.6em; color: var(--text-light); }

.undo-btn {
  position: absolute; bottom: 0; left: 0;
  background: #f1f5f9; color: var(--text); font-weight: 700; font-size: clamp(12px, 1.5vw, 20px);
  border: none; border-radius: 99px; padding: 1.5vh 2.5vw; cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; gap: 0.5vw; z-index: 10;
}
.undo-btn:active { transform: scale(0.95); background: #e2e8f0; }
.undo-btn:disabled { opacity: 0; pointer-events: none; } 

.close-btn {
  position: absolute; bottom: 0; right: 0;
  background: var(--text); color: #fff; font-weight: 700; font-size: clamp(12px, 1.5vw, 20px);
  border: none; border-radius: 99px; padding: 1.5vh 2.5vw; cursor: pointer; transition: 0.2s;
  display: flex; align-items: center; gap: 0.5vw; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.close-btn:active { transform: scale(0.95); }
.close-btn:disabled { opacity: 0; pointer-events: none; }


/* ── q-sub ── */
.q-sub { font-size: clamp(12px, 1.4vw, 18px); font-weight: 700; color: var(--muted); margin-top: 0.5vh; text-align: center; }

/* ── 投票画面: 画像なし・大きな丸バッジ＋テキスト ── */
.choices { display: flex; justify-content: center; gap: 4vw; align-items: flex-end; flex: 1; padding: 2vh 0 1vh; }
.choice {
  display: flex; flex-direction: column; align-items: center; gap: 2vh;
  cursor: pointer; background: none; border: none; outline: none;
  -webkit-tap-highlight-color: transparent; transition: transform 0.15s;
  width: clamp(100px, 16vw, 200px);
}
.choice-circle {
  width: clamp(70px, 9vw, 130px); height: clamp(70px, 9vw, 130px);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: clamp(28px, 4vw, 56px); font-weight: 900;
  box-shadow: 0 8px 24px rgba(0,0,0,0.22), 0 3px 6px rgba(0,0,0,0.12);
  transition: transform 0.15s;
}
.choice-label { font-size: clamp(20px, 2.8vw, 40px); font-weight: 700; color: var(--text); height: 2.6em; display: flex; align-items: center; justify-content: center; }
.choice-label-inner { line-height: 1.3; text-align: center; white-space: nowrap; }
.choice:active .choice-circle { transform: scale(0.92); }
.choice.flash .choice-circle { transform: scale(1.1); filter: brightness(0.85); }

/* ── 結果画面: 問題文ヘッダー ── */
#s-result { background: #ffffff; border-radius: 24px; }
.r-question-head { text-align: center; margin-bottom: 0; flex-shrink: 0; }
.r-q-title { font-size: clamp(20px, 2.8vw, 40px); font-weight: 900; color: var(--text); margin-top: 0.3vh; }
.r-total-label { position: absolute; top: 4vh; left: 3vw; font-size: clamp(14px, 1.8vw, 24px); font-weight: 700; color: var(--text-light); z-index: 10; }
.r-total-label b { color: var(--text); font-size: 1.2em; font-variant-numeric: tabular-nums; }

/* ── 縦棒グラフ ── */
.vbar-layout {
  display: flex; gap: 2vw; justify-content: center; align-items: stretch;
  flex: 1; width: 100%; padding: 1vh 4vw 20pt; min-height: 0;
}
.vbar-col {
  display: flex; flex-direction: column; align-items: center; gap: 1.8vh;
  flex: 1; max-width: 20%; min-height: 0;
}
/* バッジ以外（選択肢テキスト・棒グラフ・％）のまとまり：赤枠を5pt下げる */
.vbar-body {
  display: flex; flex-direction: column; align-items: center; gap: 1.8vh;
  flex: 1; width: 100%; min-height: 0; transform: translateY(20pt);
}
/* 棒グラフ本体ラッパー：縦いっぱいに伸ばしてtrackを確実に高さ確保 */
.vbar-graph-wrap {
  flex: 1; width: 100%; position: relative; min-height: 80px;
}
/* track：ラッパーに対して絶対配置で確実にfull-height */
.vbar-track {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 60%; height: 100%;
  background: var(--grid-line); border-radius: 8px 8px 4px 4px; overflow: hidden;
}
.vbar-fill {
  position: absolute; bottom: 0; left: 0;
  width: 100%; height: 0%;
  border-radius: 8px 8px 4px 4px;
  transition: height 1.8s cubic-bezier(0.16, 1, 0.3, 1);
}
/* カップ横一列：棒グラフの上に固定 */
.vbar-cup {
  width: clamp(44px, 6vw, 80px); object-fit: contain; flex-shrink: 0;
  filter: drop-shadow(0 3px 6px rgba(0,0,0,0.15));
}
/* %：棒グラフの上端付近に表示 */
.vbar-pct {
  font-size: clamp(15px, 2vw, 30px); font-weight: 900; color: var(--text);
  font-variant-numeric: tabular-nums; white-space: nowrap;
  transition: color 0.2s;
}
.vbar-pct.pop {
  animation: pctPop 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}
@keyframes pctPop {
  0%   { transform: scale(1);    color: var(--text); }
  40%  { transform: scale(1.35); color: var(--pop-c, var(--c-a)); }
  100% { transform: scale(1);    color: var(--pop-c, var(--c-a)); }
}
.vbar-circle {
  width: clamp(40px, 4.8vw, 62px); height: clamp(40px, 4.8vw, 62px);
  border-radius: 50%; color: #fff; font-weight: 900;
  font-size: clamp(18px, 2.3vw, 32px);
  display: flex; align-items: center; justify-content: center; flex-shrink: 0; transform: translateY(20pt);
}

/* ── 2. 結果画面 (大原則：縦2分割レイアウト) ── */
.result-layout { 
  display: flex; gap: 3vw; width: 100%; height: 100%; align-items: stretch; padding: 1vh 0; 
}

/* 左側：元画像・質問表示エリア（1枚目の幅をしっかり確保） */
.result-left {
  flex: 0.9; background: #fafafa; border-radius: 20px; border: 1px solid #f1f5f9;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 2vw; text-align: center;
}

/* 右側：結果グラフエリア */
.result-right {
  flex: 2.1; display: flex; flex-direction: column; height: 100%; position: relative;
  /* 上下の余白を均等にして、画面全体にパンパンに広げる */
  padding: 7vh 0 3vh 0; 
}

/* グラフ背景の縦目盛り線（右画面全体に広げる） */
.r-grid-container {
  position: absolute; top: 6vh; bottom: 3vh; left: 14vw; right: 8vw; 
  pointer-events: none; z-index: 0;
}
.r-grid-line {
  position: absolute; top: 0; bottom: 0; width: 1px; background-color: var(--grid-line);
}
.r-grid-label {
  position: absolute; top: -4.5vh; transform: translateX(-50%);
  font-size: clamp(12px, 1.4vw, 18px); font-weight: 700; color: var(--text-light);
  font-variant-numeric: tabular-nums;
}

/* グラフ行全体（間隔を広げて縦いっぱいに大きく配置） */
.r-rows { 
  display: flex; flex-direction: column; justify-content: space-between; 
  height: 100%; width: 100%; position: relative; z-index: 1; 
}
.r-row { 
  display: flex; align-items: center; width: 100%;
  opacity: 0; transform: translateX(15px);
  animation: slideIn 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
}
.r-row:nth-child(1) { animation-delay: 0.1s; }
.r-row:nth-child(2) { animation-delay: 0.2s; }
.r-row:nth-child(3) { animation-delay: 0.3s; }
.r-row:nth-child(4) { animation-delay: 0.4s; }

@keyframes slideIn {
  to { opacity: 1; transform: translateX(0); }
}

/* 【完全固定】左側：選択肢エリア（幅を完全に固定し、1行で美しく並列に揃える） */
.r-choice-info {
  display: flex; align-items: center; justify-content: flex-start; gap: 1vw;
  width: 14vw; flex-shrink: 0;
}
.r-circle {
  width: clamp(26px, 3.2vw, 45px); height: clamp(26px, 3.2vw, 45px);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: clamp(12px, 1.5vw, 20px); font-weight: 900; flex-shrink: 0;
}
.r-label-text {
  font-size: clamp(14px, 1.8vw, 24px); font-weight: 700; color: var(--text);
  white-space: nowrap; text-align: left;
}

/* 中央：バーグラフエリア（横幅を最大限大きく） */
.r-bar-area {
  flex: 1; display: flex; align-items: center; position: relative;
  margin-right: 8vw; 
}
.r-bar-track {
  width: 100%; height: clamp(40px, 6vh, 70px); background: transparent;
  display: flex; align-items: center; position: relative;
}
.r-bar { 
  height: 100%; width: 0%; border-radius: 4px;
  transition: width 2.5s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 4px 15px rgba(0,0,0,0.06);
  display: flex; align-items: center; position: relative;
}

/* 【基本表記】バーの中のパーセンテージ（バーが短くても左端に常時表示されるよう調整） */
.r-bar-inner-text {
  color: #ffffff; font-weight: 900; font-size: clamp(14px, 2vw, 28px);
  white-space: nowrap; position: absolute; left: 1vw; /* 左端に固定して常時表示 */
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
}

/* バーの先っちょに追従する得票数エリア */
.r-bar-stats-edge {
  position: absolute; left: 0; 
  display: flex; align-items: baseline; padding-left: 0.8vw;
  white-space: nowrap; pointer-events: none;
}
.r-count-edge {
  font-size: clamp(14px, 2vw, 28px); font-weight: 700; color: var(--text);
  font-variant-numeric: tabular-nums;
}
.r-count-edge span { font-size: 0.6em; color: var(--text-light); font-weight: 500; margin-left: 1px; }

/* 1位の棒の真上に出るポップアップ */
.voice-popup {
  position: relative; align-self: center;
  display: flex; flex-direction: column; align-items: center;
  opacity: 0; pointer-events: none;
  transform: translateY(-8px);
  transition: opacity 0.4s, transform 0.4s cubic-bezier(0.2,0.8,0.2,1);
  z-index: 20;
}
.voice-popup.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
.voice-popup-arrow {
  display: block;
  width: 0; height: 0;
  border-left: 14px solid transparent;
  border-right: 14px solid transparent;
  border-bottom: 14px solid #555555;
}
.voice-popup-btn {
  background: #555555; color: #ffffff; border: none; border-radius: 22px;
  padding: 1.7vh 3vw; font-size: clamp(15px, 1.9vw, 26px); font-weight: 900;
  cursor: pointer; box-shadow: 0 8px 22px rgba(0,0,0,0.22); transition: 0.15s;
  white-space: nowrap; letter-spacing: 0.02em;
}
.voice-popup-btn:active { transform: scale(0.96); }

/* ── 3. 最多の声画面 ── */
.voice-layout { display: flex; flex-direction: column; align-items: center; justify-content: space-between; height: 100%; width: 100%; position: relative; padding: 5vh 1vw 6vh;}
.voice-main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; min-height: 0; }
.voice-title { font-size: clamp(24px, 4.2vw, 56px); font-weight: 900; margin-bottom: clamp(22px, 5vh, 60px); color: #231815; letter-spacing: 0.02em; }
.voice-content { display: flex; align-items: center; justify-content: center; gap: 3vw; width: 100%; }
.silhouette { width: clamp(110px, 14vw, 220px); line-height: 0; flex-shrink: 0; }
.silhouette svg { width: 100%; height: auto; display: block; }
.silhouette circle, .silhouette path { fill: #666 !important; color: #666 !important; }
.bubbles { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: clamp(16px, 1.9vw, 32px); flex: 1; max-width: 66%; height: clamp(170px, 33vh, 360px); }
.bubble { background: var(--bubble-c, #1edc50); padding: clamp(12px,1.4vw,26px) clamp(16px,1.9vw,34px); border-radius: clamp(16px,2vw,30px); font-weight: 700; font-size: clamp(13px, 1.65vw, 23px); border: none; position: relative; color: #ffffff; line-height: 1.45; display: flex; align-items: center;}
.bubble::before { content: ''; position: absolute; top: 50%; left: -13px; transform: translateY(-50%); border-width: 13px 14px 13px 0; border-style: solid; border-color: transparent var(--bubble-c, #1edc50) transparent transparent; }

.reset-btn { position: absolute; top: 2.5vh; right: 2.5vw; background: #fff; border: 2px solid var(--text); color: var(--text); border-radius: 99px; padding: 0.8vh 1.8vw; font-weight: 700; font-size: clamp(12px, 1.4vw, 18px); cursor: pointer; z-index: 20; }
.voice-reset-wrap { display: flex; flex-direction: column; align-items: center; gap: 1vh; margin-top: 0; opacity: 0; transform: translateY(12px); transition: opacity 0.5s, transform 0.5s cubic-bezier(0.2,0.8,0.2,1); }
.voice-reset-wrap.show { opacity: 1; transform: translateY(0); }
.voice-reset-btn {
  margin-top: 0; padding: clamp(7px,1vh,12px) clamp(18px,2.6vw,40px);
  background: #fff; color: #231815;
  border: 2px solid #231815; border-radius: 99px;
  font-size: clamp(12px, 1.5vw, 20px); font-weight: 900;
  cursor: pointer; box-shadow: none;
  opacity: 1; transform: none;
  flex-shrink: 0;
}
.voice-reset-btn.show { opacity: 1; transform: translateY(0); }
.voice-reset-btn:active { transform: scale(0.97); }

/* 自動遷移プログレスバー */
.timeout-bar-wrap {
  position: absolute; top: 0; left: 0; width: 100%; height: 3px; background: transparent; z-index: 50;
}
.timeout-bar {
  height: 100%; width: 0%; background: var(--text-light); transition: width linear; opacity: 0.3;
}

/* ミニサイズ用ヘルパー（左の2分割エリア用） */
.mini-choices { display: flex; gap: 2vw; margin-top: 3vh; transform: scale(0.85); transform-origin: top center;}
.mini-choice { display: flex; flex-direction: column; align-items: center; gap: 1vh; }
.mini-choice .choice-label { font-size: clamp(14px, 1.8vw, 24px); color: var(--text); }

/* ── 投票画面: 画像に焼き込まれたA/B/Cラベルを直接タップ ── */
.touch-img-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; width: 100%; padding: 1vh 2vw 3vh; min-height: 0; }
/* 画像とオーバーレイをぴったり一致させるため、画像サイズに合わせて縮むステージ */
.touch-stage { position: relative; display: inline-flex; max-width: 95%; max-height: clamp(160px, min(46vh, 28vw), 500px); }
.touch-img { display: block; width: auto; height: auto; max-width: 100%; max-height: clamp(160px, min(46vh, 28vw), 500px); object-fit: contain; border-radius: 16px; filter: drop-shadow(0 6px 20px rgba(0,0,0,0.14)); user-select: none; pointer-events: none; }
.touch-zones-overlay { position: absolute; inset: 0; }
/* 焼き込みラベルの中心に重ねる、円形タップ領域 */
.touch-zone {
  position: absolute; transform: translate(-50%, -50%);
  width: 19%; aspect-ratio: 1; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border: none; background: transparent;
  -webkit-tap-highlight-color: transparent; outline: none;
}
/* 下の焼き込みラベルをぴったり覆う丸バッジ（タップ時アクション用） */
.touch-zone-badge {
  width: 33%; aspect-ratio: 1; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-weight: 900; font-size: clamp(16px, 2vw, 30px);
  box-shadow: 0 6px 18px rgba(0,0,0,0.20);
  transition: transform 0.15s, filter 0.15s;
}
.touch-zone:active .touch-zone-badge { transform: scale(0.9); }
.touch-zone.flash .touch-zone-badge { transform: scale(1.3); filter: brightness(0.82); }

/* __ADMIN_BACKUP_CSS__ */
.q-head, .r-head { -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
.admin-toast{position:fixed;left:50%;bottom:5vh;transform:translateX(-50%) translateY(10px);background:#2c3e50;color:#fff;padding:12px 24px;border-radius:99px;font-weight:700;font-size:clamp(13px,1.6vw,20px);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.25);}
.admin-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.admin-panel{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;z-index:10000;}
.admin-panel.show{opacity:1;pointer-events:auto;}
.admin-box{background:#fff;border-radius:18px;padding:24px;width:min(86vw,420px);box-shadow:0 20px 60px rgba(0,0,0,.35);display:flex;flex-direction:column;gap:12px;}
.admin-title{font-weight:900;font-size:clamp(16px,2.2vw,24px);color:#2c3e50;text-align:center;margin:0 0 6px;}
.admin-btn{border:none;border-radius:12px;padding:14px;cursor:pointer;font-weight:800;font-size:clamp(13px,1.7vw,19px);background:#2980b9;color:#fff;}
.admin-btn.danger{background:#e74c3c;}
.admin-btn.ghost{background:#ecf0f1;color:#2c3e50;}
</style>
<style>
/* === 下スクロール更新（プルトゥリフレッシュ）抑制 / 体験中の事故防止用 === */
/* ブラウザのリロードボタン・キーボード(Cmd/Ctrl+R, F5)での更新には影響しません */
html, body { overscroll-behavior: none; }
</style>
</head>
<body>
<div class="wrap"><div class="card">

  <div class="timeout-bar-wrap"><div class="timeout-bar" id="timeout-bar"></div></div>

  <div class="screen show" id="s-vote">
    <div class="q-head">
      <p class="q-number" id="q-number" style="display:none"></p>
      <p class="q-title" id="q-title"></p>
      <p class="q-sub">画像をタップして選んでね</p>
    </div>

    <div class="touch-img-wrap">
      <div class="touch-stage">
        <img class="q-img touch-img" id="q-img" src="" alt="">
        <div class="touch-zones-overlay" id="touch-zones"></div>
      </div>
    </div>

    <div class="bottom-area">
        <button class="undo-btn" id="undo-btn" onclick="undoVote()" disabled>リセット</button>
        <div class="live-counts-container">
            <div class="live-counts" id="live-counts"></div>
        </div>
        <button class="close-btn" id="close-btn" onclick="finishVote()" disabled>結果を見る ➡</button>
    </div>

/* ── SE engine (Web Audio API) ── */
const SE = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  // 投票タップ：木琴っぽい温かいポン音
  function vote() {
    try {
      const c = ac(), t = c.currentTime;
      const o = c.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(660, t);
      o.frequency.exponentialRampToValueAtTime(880, t + 0.16);
      const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 3000;
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.35, t + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
      o.connect(f); f.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + 0.2);
    } catch(e) {}
  }
  // グラフ伸び：高共鳴ノイズスウィープ（ウープ系）
  function graph() {
    try {
      const c = ac(), t = c.currentTime;
      const o = c.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(400, t);
      o.frequency.exponentialRampToValueAtTime(1600, t + 0.8);
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + 0.85);
    } catch(e) {}
  }
  function bell() {
    try {
      const c = ac(), t = c.currentTime;
      const N = {C5:523.3, E5:659.3, G5:784, C6:1046.5};
      function _bell(freq, t0, dur, gain) {
        [1, 2.01, 3.0].forEach((r, i) => {
          const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = freq * r;
          const g = c.createGain();
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.linearRampToValueAtTime(gain * [1, .5, .25][i], t0 + 0.005);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur * [1, .7, .45][i]);
          o.connect(g); g.connect(c.destination);
          o.start(t0); o.stop(t0 + dur + 0.05);
        });
      }
      [N.C5, N.E5, N.G5, N.C6].forEach((f, i) => _bell(f, t + i * 0.11, 0.3, 0.14));
    } catch(e) {}
  }
  return { vote, graph, bell };
})();

function loadGlobalData() {
  /* === 事前集計シード：未投票（localStorage空）のときだけ初期票を投入 === */
  if (localStorage.getItem(STORAGE_KEY) === null) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(SEED_VOTES)); } catch(e) {}
  }
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    try {
      const parsed = JSON.parse(saved);
      if (Array.isArray(parsed) && parsed.length === CHOICES.length) {
        globalVotes = parsed;
      } else {
        globalVotes = CHOICES.map(() => 0);
        localStorage.removeItem(STORAGE_KEY);
      }
    } catch(e) {
      globalVotes = CHOICES.map(() => 0);
      localStorage.removeItem(STORAGE_KEY);
    }
    globalTotal = globalVotes.reduce((sum, val) => sum + val, 0);
  } else {
    globalVotes = CHOICES.map(() => 0);
    globalTotal = 0;
  }
}

function animateValue(obj, start, end, duration, formatStr, onComplete) {
  let startTimestamp = null;
  const step = (timestamp) => {
    if (!startTimestamp) startTimestamp = timestamp;
    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
    const easeProgress = 1 - Math.pow(1 - progress, 1.5);
    const currentVal = Math.floor(easeProgress * (end - start) + start);
    
    if (formatStr === '%') {
      obj.innerHTML = `${currentVal}%`;
    } else {
      obj.innerHTML = formatStr === '票' ? `${currentVal}<small>票</small>` : `${currentVal.toLocaleString()}<span>票</span>`;
    }
    
    if (progress < 1) {
      window.requestAnimationFrame(step);
    } else {
      if (formatStr === '%') {
        obj.innerHTML = `${end}%`;
      } else {
        obj.innerHTML = formatStr === '票' ? `${end}<small>票</small>` : `${end.toLocaleString()}<span>票</span>`;
      }
      if (onComplete) onComplete();
    }
  };
  window.requestAnimationFrame(step);
}

function animateEdgePosition(obj, startPct, endPct, duration) {
  let startTimestamp = null;
  const step = (timestamp) => {
    if (!startTimestamp) startTimestamp = timestamp;
    const progress = Math.min((timestamp - startTimestamp) / duration, 1);
    const easeProgress = 1 - Math.pow(1 - progress, 3);
    const currentPct = easeProgress * (endPct - startPct) + startPct;
    
    obj.style.left = currentPct + '%';
    
    if (progress < 1) {
      window.requestAnimationFrame(step);
    } else {
      obj.style.left = endPct + '%';
    }
  };
  window.requestAnimationFrame(step);
}

function startTimer() {
  clearTimeout(timeoutId);
  const bar = $('timeout-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  
  setTimeout(() => {
    bar.style.transition = `width ${TIMEOUT_SEC}s linear`;
    bar.style.width = '100%';
  }, 50);

  timeoutId = setTimeout(() => { resetAll(); }, TIMEOUT_SEC * 1000);
}

function stopTimer() {
  clearTimeout(timeoutId);
  const bar = $('timeout-bar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
}

function init(){
  loadGlobalData();

  $('q-number').textContent = QUESTION.number;
  $('q-title').innerHTML = QUESTION.title.replace('\n', '<br>');

  const qImg = $('q-img'); if(qImg){ qImg.src = QUESTION_IMG; qImg.style.display = QUESTION_IMG ? '' : 'none'; }

  const box = $('touch-zones');
  const countsBox = $('live-counts');
  box.innerHTML = '';
  countsBox.innerHTML = '';

  CHOICES.forEach((c, i)=>{
    const zone = document.createElement('button');
    zone.className = 'touch-zone';
    zone.id = 'choice-'+i;
    zone.setAttribute('aria-label', c.letter);
    if (c.hot) { zone.style.left = c.hot.x + '%'; zone.style.top = c.hot.y + '%'; }
    zone.innerHTML = `<span class="touch-zone-badge" style="background:${c.color}">${c.letter}</span>`;
    zone.addEventListener('click', ()=>castVote(i));
    box.appendChild(zone);

    countsBox.innerHTML += `<span class="live-count-item" id="lc-${i}"><span class="lc-letter" style="color:${c.color}">${c.letter}</span><span class="lc-num" style="color:var(--text);">${sessionVotes[i]}<small>票</small></span></span>`;
  });
  updateStatus();
  stopTimer();
}

function castVote(i){
  if(isClosed || sessionTotal >= MAX_VOTES) return;
  SE.vote();

  sessionVotes[i]++;
  sessionTotal++;
  voteHistory.push(i);

  const countEl = $(`lc-${i}`);
  countEl.innerHTML = `<span class="lc-letter" style="color:${CHOICES[i].color}">${CHOICES[i].letter}</span><span class="lc-num" style="color:var(--text);">${sessionVotes[i]}<small>票</small></span>`;
  countEl.style.transform = 'scale(1.3)';
  setTimeout(() => countEl.style.transform = 'scale(1)', 150);

  const el = $('choice-'+i);
  el.classList.add('flash');
  setTimeout(()=>el.classList.remove('flash'), 150);

  updateStatus();

  if(sessionTotal >= MAX_VOTES){
    finishVote();
  }
}

function undoVote(){
  if(isClosed) return;
  sessionVotes = CHOICES.map(() => 0);
  sessionTotal = 0;
  voteHistory = [];
  CHOICES.forEach((c, i) => {
    $(`lc-${i}`).innerHTML = `<span class="lc-letter" style="color:${c.color}">${c.letter}</span><span class="lc-num" style="color:var(--text);">0<small>票</small></span>`;
  });
  updateStatus();
}

function updateStatus(){
  $('undo-btn').disabled = voteHistory.length === 0;
  $('close-btn').disabled = sessionTotal === 0;
}

function finishVote() {
  if(sessionTotal > 0) {
    isClosed = true;
    $('undo-btn').disabled = true;
    $('close-btn').disabled = true;

    for(let i=0; i<CHOICES.length; i++) {
      globalVotes[i] += sessionVotes[i];
    }
    globalTotal += sessionTotal;

    localStorage.setItem(STORAGE_KEY, JSON.stringify(globalVotes));

    setTimeout(buildResult, 400);
  }
}

function buildResult(){
  $('r-number').textContent = QUESTION.number;
  $('r-title').innerHTML = QUESTION.title.replace('\n', '<br>');
  $('r-total-num').textContent = globalTotal.toLocaleString();

  const layout = $('vbar-layout');
  layout.innerHTML = '';
  CHOICES.forEach((c, i) => {
    layout.innerHTML += `
      <div class="vbar-col" id="vcol-${i}">
        <div class="vbar-circle" style="background:${c.color}">${c.letter}</div>
        <div class="vbar-body">
          <div class="vbar-graph-wrap" id="vwrap-${i}">
            <div class="vbar-track">
              <div class="vbar-fill" id="vfill-${i}" style="background:${c.color}"></div>
            </div>
          </div>
          <div class="vbar-pct" id="vpct-${i}">0%</div>
        </div>
      </div>`;
  });

  scr('s-result');
  startTimer();

  setTimeout(() => {
    SE.graph();
    CHOICES.forEach((c, i) => {
      const pct   = globalTotal > 0 ? Math.round(globalVotes[i] / globalTotal * 100) : 0;
      const fill  = $('vfill-'+i);
      const pctEl = $('vpct-'+i);
      fill.style.height = pct + '%';
      pctEl.style.setProperty('--pop-c', c.color);
      animateValue(pctEl, 0, pct, 1600, '%', () => {
        pctEl.classList.remove('pop');
        void pctEl.offsetWidth;
        pctEl.classList.add('pop');
      });
    });
    setTimeout(() => { SE.bell(); }, 1820);
  }, 150);

  let winnerIndex = globalVotes.indexOf(Math.max(...globalVotes));
  if (winnerIndex < 0) winnerIndex = 0;
  const bubblesBox = $('voice-bubbles');
  bubblesBox.innerHTML = '';
  const winnerColor = CHOICES[winnerIndex] ? CHOICES[winnerIndex].color : 'var(--c-a)';
  bubblesBox.style.setProperty('--bubble-c', winnerColor);
  (VOICE_DATA[winnerIndex] || VOICE_DATA[0]).slice(0,4).forEach(text => {
    bubblesBox.innerHTML += `<div class="bubble">${text}</div>`;
  });
  const title = $('voice-screen-title');
  if (title) title.textContent = '1位を選んだ人の声';
  // 1位のカラムの上にポップアップを配置
  // fillの先端（カップの上）にポップアップを配置 — アニメ完了後に計算
  setTimeout(() => {
    const popup = $('voice-popup');
    const winnerCol = $('vcol-' + winnerIndex);
    if (!winnerCol || !popup) { popup && popup.classList.add('show'); return; }
    // オフセットをリセットして自然位置（中央・最下部）を測る
    popup.style.left = '0px'; popup.style.top = '0px';
    const popRect = popup.getBoundingClientRect();
    const colRect = winnerCol.getBoundingClientRect();
    const pctEl   = $('vpct-' + winnerIndex);
    const pctRect = pctEl ? pctEl.getBoundingClientRect() : null;
    // 横：1位カラムの中央に合わせる
    const dx = (colRect.left + colRect.width / 2) - (popRect.left + popRect.width / 2);
    // 縦：1位の棒グラフ（％）の真下に出す（矢印が上＝棒を指す）
    const targetTop = (pctRect ? pctRect.bottom : colRect.bottom) + 6;
    const dy = targetTop - popRect.top - 8;
    popup.style.left = dx + 'px';
    popup.style.top  = dy + 'px';
    popup.classList.add('show');
  }, 2500);
}

let voiceCountdownId = null;
function showVoice() {
  const wrap = $('voice-reset-wrap');
  if (wrap) wrap.classList.remove('show');
  clearInterval(voiceCountdownId);
  scr('s-voice');
  startTimer();
  setTimeout(() => {
    if (wrap) wrap.classList.add('show');
    // カウントダウン
    voiceCountdownId = setTimeout(() => { resetAll(); }, 10000);
  }, 1000);
}

function resetAll() {
  sessionVotes = CHOICES.map(()=>0);
  sessionTotal = 0;
  voteHistory = [];
  isClosed = false;
  const _p = $('voice-popup'); if(_p){ _p.classList.remove('show'); }
  clearInterval(typeof voiceCountdownId !== 'undefined' ? voiceCountdownId : null);
  const _rw = $('voice-reset-wrap'); if(_rw){ _rw.classList.remove('show'); }
  stopTimer();
  init();
  scr('s-vote');
}

init();

/* __ADMIN_BACKUP_BLOCK__ */
(function(){
  if (typeof STORAGE_KEY === 'undefined') return;
  var DAILY_KEY = STORAGE_KEY + '_daily';
  var BK_DATE_KEY = STORAGE_KEY + '_lastbk';
  function todayStr(){var d=new Date(),z=function(n){return String(n).padStart(2,'0');};
    return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
  function loadDaily(){try{var o=JSON.parse(localStorage.getItem(DAILY_KEY));return (o&&typeof o==='object')?o:{};}catch(e){return {};}}
  function recordDaily(votes){if(!votes)return;var d=loadDaily(),k=todayStr(),n=votes.length;
    if(!Array.isArray(d[k])||d[k].length!==n)d[k]=new Array(n).fill(0);
    for(var i=0;i<n;i++)d[k][i]+=votes[i];
    try{localStorage.setItem(DAILY_KEY,JSON.stringify(d));}catch(e){}}
  function labels(){var arr=(typeof CHOICES!=='undefined')?CHOICES:((typeof SEATS!=='undefined')?SEATS:[]);
    return arr.map(function(c,i){return (c&&(c.label||c.name))?(c.label||c.name).replace(/\n/g,' '):('選択肢'+(i+1));});}
  function buildCSV(){var d=loadDaily(),labs=labels();
    var header=['日付'].concat(labs).concat(['合計']);var rows=[header.join(',')];
    Object.keys(d).sort().forEach(function(date){var a=d[date];var t=a.reduce(function(x,y){return x+y;},0);
      rows.push([date].concat(a).concat([t]).join(','));});
    var gv=(typeof globalVotes!=='undefined')?globalVotes:[];var gt=(typeof globalTotal!=='undefined')?globalTotal:0;
    rows.push(['累計'].concat(gv).concat([gt]).join(','));
    return '\uFEFF'+rows.join('\r\n');}
  function downloadCSV(fn){var blob=new Blob([buildCSV()],{type:'text/csv;charset=utf-8;'});
    var url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);}
  function maybeAutoBackup(){var last=localStorage.getItem(BK_DATE_KEY),t=todayStr();
    if(false){/* 自動CSV出力は無効化（展示中に画面が出ないように）。手動バックアップは管理メニューから可能 */}
    try{localStorage.setItem(BK_DATE_KEY,t);}catch(e){}}
  function showToast(msg){var t=document.getElementById('admin-toast');
    if(!t){t=document.createElement('div');t.id='admin-toast';t.className='admin-toast';document.body.appendChild(t);}
    t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},2200);}
  function clearAllData(){try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
    try{localStorage.removeItem(DAILY_KEY);}catch(e){}
    if(typeof globalVotes!=='undefined'){for(var i=0;i<globalVotes.length;i++)globalVotes[i]=0;}
    if(typeof globalTotal!=='undefined'){globalTotal=0;}
    if(typeof resetAll==='function'){resetAll();}else if(typeof init==='function'){init();}
    if(typeof scr==='function'){scr('s-vote');}}
  function adminClear(){if(window.confirm('累計の投票データをすべて削除します。\nこの操作は取り消せません。よろしいですか？')){clearAllData();showToast('投票データを削除しました');}}
  function openPanel(){var ov=document.getElementById('admin-panel');
    if(ov){ov.classList.add('show');return;}
    ov=document.createElement('div');ov.id='admin-panel';ov.className='admin-panel';
    ov.innerHTML='<div class="admin-box"><p class="admin-title">管理メニュー</p>'+
      '<button class="admin-btn" data-act="backup">バックアップを保存（CSV）</button>'+
      '<button class="admin-btn danger" data-act="clear">累計データを全削除</button>'+
      '<button class="admin-btn ghost" data-act="close">閉じる</button></div>';
    document.body.appendChild(ov);
    ov.addEventListener('click',function(e){var act=e.target&&e.target.dataset?e.target.dataset.act:null;
      if(e.target===ov||act==='close'){ov.classList.remove('show');return;}
      if(act==='backup'){downloadCSV('backup_'+STORAGE_KEY+'_'+todayStr()+'.csv');showToast('バックアップを保存しました');ov.classList.remove('show');}
      else if(act==='clear'){ov.classList.remove('show');adminClear();}});
    requestAnimationFrame(function(){ov.classList.add('show');});}
  function attachLP(el,ms,cb){if(!el)return;var timer=null;
    el.addEventListener('pointerdown',function(){timer=setTimeout(cb,ms);});
    ['pointerup','pointerleave','pointercancel'].forEach(function(ev){el.addEventListener(ev,function(){if(timer){clearTimeout(timer);timer=null;}});});
    el.addEventListener('contextmenu',function(e){e.preventDefault();});}
  if(typeof window.finishVote==='function'){
    var _orig=window.finishVote;
    window.finishVote=function(){
      var snap=(typeof sessionVotes!=='undefined'&&sessionVotes)?sessionVotes.slice():null;
      var before=(typeof globalTotal!=='undefined')?globalTotal:0;
      var r=_orig.apply(this,arguments);
      if(snap&&typeof globalTotal!=='undefined'&&globalTotal>before){recordDaily(snap);maybeAutoBackup();}
      return r;
    };
  }
  try{if(!localStorage.getItem(BK_DATE_KEY))localStorage.setItem(BK_DATE_KEY,todayStr());}catch(e){}
  attachLP(document.querySelector('.q-head'),5000,openPanel);
  attachLP(document.querySelector('.r-head'),5000,openPanel);
  window.__buildCSV=buildCSV;window.__openPanel=openPanel;window.__clearAllData=clearAllData;
})();
</script>
<script>
/* NOZOOM-HARDENED: ピンチ/ダブルタップ/Ctrlズームを抑止（iOS Safari & WebView対応） */
(function(){
  function killMulti(e){ if (e.touches && e.touches.length > 1) { e.preventDefault(); } }
  ['touchstart','touchmove'].forEach(function(t){
    document.addEventListener(t, killMulti, { passive:false, capture:true });
  });
  ['gesturestart','gesturechange','gestureend'].forEach(function(t){
    document.addEventListener(t, function(e){ e.preventDefault(); }, { passive:false, capture:true });
    window.addEventListener(t, function(e){ e.preventDefault(); }, { passive:false, capture:true });
  });
  var lastTouchEnd = 0;
  document.addEventListener('touchend', function(e){
    var now = Date.now();
    if (now - lastTouchEnd <= 350) { e.preventDefault(); }
    lastTouchEnd = now;
  }, { passive:false, capture:true });
  document.addEventListener('wheel', function(e){ if (e.ctrlKey) e.preventDefault(); }, { passive:false });
  document.addEventListener('keydown', function(e){
    if ((e.ctrlKey || e.metaKey) && ['+','-','=','0'].indexOf(e.key) !== -1) e.preventDefault();
  });
})();
</script>
<script>
/* ===== 集計データ保護（自動ミラー＋復元用JSONバックアップ）/ 設定不要・ネット不要 ===== */
(function(){
  if (typeof STORAGE_KEY === 'undefined') return;
  var MIRROR_KEY = STORAGE_KEY + '_bk';
  var DAILY_KEY  = STORAGE_KEY + '_daily';
  function tot(s){ try{ var a=JSON.parse(s); return Array.isArray(a)? a.reduce(function(x,y){return x+(+y||0);},0) : -1; }catch(e){ return -1; } }

  /* (1) 起動時の自動復元：メイン集計だけ消えていて控え（ミラー）が残っていれば戻す */
  try{
    var main = localStorage.getItem(STORAGE_KEY);
    var bk   = localStorage.getItem(MIRROR_KEY);
    if (tot(bk) > tot(main)) {
      localStorage.setItem(STORAGE_KEY, bk);
      if (typeof globalVotes !== 'undefined') {
        var a = JSON.parse(bk);
        for (var i=0;i<globalVotes.length;i++) globalVotes[i] = a[i]||0;
        if (typeof globalTotal !== 'undefined') globalTotal = globalVotes.reduce(function(x,y){return x+y;},0);
      }
    }
  }catch(e){}

  /* (2) 投票が確定するたびに控え（ミラー）を更新 */
  if (typeof window.finishVote === 'function') {
    var _f = window.finishVote;
    window.finishVote = function(){
      var r = _f.apply(this, arguments);
      try{ localStorage.setItem(MIRROR_KEY, localStorage.getItem(STORAGE_KEY) || ''); }catch(e){}
      return r;
    };
  }

  /* (3) 復元用バックアップ（JSON）の保存／読み込み */
  function ts(){ var d=new Date(),z=function(n){return String(n).padStart(2,'0');};
    return ''+d.getFullYear()+z(d.getMonth()+1)+z(d.getDate())+'_'+z(d.getHours())+z(d.getMinutes()); }
  function saveBackup(){
    var data = { key: STORAGE_KEY,
      votes: (function(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY));}catch(e){return null;}})(),
      daily: (function(){try{return JSON.parse(localStorage.getItem(DAILY_KEY));}catch(e){return null;}})(),
      savedAt: new Date().toISOString() };
    var blob = new Blob([JSON.stringify(data)], {type:'application/json'});
    var url = URL.createObjectURL(blob), a=document.createElement('a');
    a.href=url; a.download='votes_backup_'+STORAGE_KEY+'_'+ts()+'.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);
  }
  function restoreBackup(){
    var inp = document.createElement('input'); inp.type='file'; inp.accept='application/json,.json';
    inp.onchange = function(){
      var file = inp.files && inp.files[0]; if(!file) return;
      var rd = new FileReader();
      rd.onload = function(){
        try{
          var d = JSON.parse(rd.result);
          if (d.key && d.key !== STORAGE_KEY) { if(!window.confirm('別の質問のバックアップのようです。\nこのまま復元してよろしいですか？')) return; }
          if (Array.isArray(d.votes)) localStorage.setItem(STORAGE_KEY, JSON.stringify(d.votes));
          if (d.daily && typeof d.daily==='object') localStorage.setItem(DAILY_KEY, JSON.stringify(d.daily));
          try{ localStorage.setItem(MIRROR_KEY, localStorage.getItem(STORAGE_KEY)||''); }catch(e){}
          alert('復元しました。画面を再読み込みします。');
          location.reload();
        }catch(e){ alert('ファイルを読み込めませんでした。'); }
      };
      rd.readAsText(file);
    };
    inp.click();
  }
  function reloadNow(){
    try{
      if (location.protocol === 'http:' || location.protocol === 'https:') {
        location.replace(location.pathname + '?v=' + Date.now() + location.hash);
      } else {
        location.reload();
      }
    }catch(e){ location.reload(); }
  }
  window.__reloadNow = reloadNow;
  window.__saveVotesBackup = saveBackup;
  window.__restoreVotesBackup = restoreBackup;

  /* (4) 隠しパネル：画面右上のすみを6秒ほど長押しで開く（既存メニューとは別系統） */
  function openSafetyPanel(){
    if (document.getElementById('safety-panel')) return;
    var ov = document.createElement('div'); ov.id='safety-panel';
    ov.style.cssText='position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-family:sans-serif;';
    ov.innerHTML='<div style="background:#fff;border-radius:16px;padding:22px;min-width:270px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.3)">'
      +'<p style="font-weight:700;margin:0 0 14px;font-size:17px;color:#222">集計バックアップ</p>'
      +'<button data-a="reload" style="display:block;width:100%;margin:8px 0;padding:13px;border:0;border-radius:10px;background:#34495e;color:#fff;font-size:15px;font-weight:700">今すぐ再読み込み（最新版を取得）</button>'
      +'<button data-a="save" style="display:block;width:100%;margin:8px 0;padding:13px;border:0;border-radius:10px;background:#2980b9;color:#fff;font-size:15px;font-weight:700">復元用バックアップを保存</button>'
      +'<button data-a="load" style="display:block;width:100%;margin:8px 0;padding:13px;border:0;border-radius:10px;background:#27ae60;color:#fff;font-size:15px;font-weight:700">バックアップから復元</button>'
      +'<button data-a="close" style="display:block;width:100%;margin:8px 0;padding:13px;border:0;border-radius:10px;background:#e2e8f0;color:#333;font-size:15px;font-weight:700">閉じる</button>'
      +'</div>';
    document.body.appendChild(ov);
    ov.addEventListener('click', function(e){
      var a = e.target && e.target.dataset ? e.target.dataset.a : null;
      if (e.target===ov || a==='close'){ ov.remove(); return; }
      if (a==='reload'){ reloadNow(); }
      else if (a==='save'){ saveBackup(); }
      else if (a==='load'){ ov.remove(); restoreBackup(); }
    });
  }
  var t=null;
  function within(x,y){ return x > window.innerWidth-60 && y < 60; }
  document.addEventListener('pointerdown', function(e){ if(within(e.clientX,e.clientY)){ if(t)clearTimeout(t); t=setTimeout(openSafetyPanel,6000);} });
  ['pointerup','pointerleave','pointercancel'].forEach(function(ev){ document.addEventListener(ev, function(){ if(t){clearTimeout(t);t=null;} }); });
})();
</script>
