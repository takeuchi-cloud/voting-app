<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票 - 空いているカフェどこ座る？</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f6f9; --card-bg: #ffffff; --text: #2c3e50; --text-light: #64748b;
  --muted: #cbd5e1; --grid-line: #e2e8f0;
  --sel: #3b82f6; --shadow: 0 10px 40px rgba(0,0,0,0.06);
}
body {
  font-family: 'Noto Sans JP', sans-serif; background: var(--bg);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; -webkit-user-select: none; user-select: none;
}
.wrap { width: 100vw; max-width: 100vw; aspect-ratio: 16/9; max-height: 100vh; padding: 2vw; }
.card {
  background: var(--card-bg); width: 100%; height: 100%;
  border-radius: 24px; box-shadow: var(--shadow); padding: 2.5% 3.5%;
  display: flex; flex-direction: column; position: relative; overflow: hidden;
}
.screen {
  display: none; flex-direction: column; flex: 1; width: 100%; height: 100%;
  opacity: 0; transition: opacity 0.4s ease;
}
.screen.show { display: flex; opacity: 1; }

/* ── 投票画面 ── */
#s-vote { justify-content: space-between; }
.q-head { text-align: center; }
.q-number { font-size: clamp(11px, 1.4vw, 20px); font-weight: 900; color: var(--muted); letter-spacing: 0.1em; }
.q-title { font-size: clamp(18px, 2.8vw, 40px); font-weight: 900; color: var(--text); line-height: 1.3; margin-top: 0.4vh; }
.q-sub { font-size: clamp(9px, 1.1vw, 15px); font-weight: 700; color: var(--text-light); margin-top: 0.3vh; }
.q-sub b { color: var(--sel); font-size: 1.15em; }

/* 画像ステージ */
.img-stage-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; padding: 0.8vh 0; }
.img-stage { position: relative; height: 100%; max-width: 100%; aspect-ratio: 1920/1080; }
.cafe-img { width: 100%; height: 100%; object-fit: contain; display: block; border-radius: 10px; }

.tap-grid {
  position: absolute;
  pointer-events: none; /* JS でサイズセット後に auto に変える */
}

/* 座席ゾーン */
.seat-zone {
  position: absolute; background: transparent; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent; border-radius: 6px;
  transition: background 0.15s, box-shadow 0.15s; outline: none;
}
.seat-zone:hover { background: rgba(59,130,246,0.05); }
.seat-zone.selected {
  background: transparent;
  box-shadow: none;
}
.seat-zone.flash { background: rgba(59,130,246,0.18); }

/* 番号バッジ（常時表示） */
.zone-badge {
  position: absolute; top: 6%; left: 50%; transform: translateX(-50%);
  background: rgba(60,60,60,0.55); color: #fff;
  font-size: clamp(7px, 0.8vw, 12px); font-weight: 700;
  border-radius: 50%; width: clamp(14px, 1.6vw, 22px); height: clamp(14px, 1.6vw, 22px);
  display: flex; align-items: center; justify-content: center;
  box-shadow: none; pointer-events: none;
  transition: background 0.15s; z-index: 3;
}
.seat-zone.selected .zone-badge { background: rgba(59,130,246,0.75); }

/* このゾーンの現在票数（投票中に表示） */
.zone-tally { display: none; }
.zone-tally.on { display: none; }

/* 結果オーバーレイ */
.zone-result {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0.7);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1px;
  pointer-events: none; opacity: 0;
  transition: opacity 0.5s, transform 0.5s cubic-bezier(0.2,0.8,0.2,1);
  white-space: nowrap;
}
.zone-result.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.zone-result .pct {
  font-size: clamp(9px, 1.3vw, 20px); font-weight: 900; color: var(--text);
  text-shadow: 0 1px 0 #fff, 0 0 6px #fff; font-variant-numeric: tabular-nums;
  background: rgba(255,255,255,0.7); border-radius: 4px; padding: 1px 4px;
  display: inline-block;
}
@keyframes pctPop {
  0%   { transform: scale(1); }
  45%  { transform: scale(1.55); }
  100% { transform: scale(1); }
}
.pct.pop { animation: pctPop 0.38s cubic-bezier(0.34,1.56,0.64,1); }
.zone-result.rank-1 { background: rgba(255,215,0,0.15); box-shadow: inset 0 0 0 1.5px rgba(255,215,0,0.6); border-radius: 8px; padding: 2px 6px; }
.zone-result.rank-1 .pct { color: #B8860B; }
.zone-result.rank-2 { background: rgba(192,192,192,0.15); box-shadow: inset 0 0 0 1.5px rgba(192,192,192,0.6); border-radius: 8px; padding: 2px 6px; }
.zone-result.rank-2 .pct { color: #808080; }
.zone-result.rank-3 { background: rgba(205,127,50,0.15); box-shadow: inset 0 0 0 1.5px rgba(205,127,50,0.6); border-radius: 8px; padding: 2px 6px; }
.zone-result.rank-3 .pct { color: #A0522D; }
.zone-crown { display: none; }
.zone-medal {
  font-size: clamp(13px, 1.8vw, 28px); line-height: 1;
  pointer-events: none; display: block; text-align: center;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.25));
}
.zone-votes {
  font-size: clamp(8px, 0.9vw, 13px); font-weight: 900;
  color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  background: rgba(0,0,0,0.35); border-radius: 99px; padding: 0 5px;
  display: none; pointer-events: none; display: block; text-align: center; margin-top: 2px;
  white-space: nowrap;
}

/* 下部 */
.bottom-area { display: flex; flex-direction: column; align-items: center; gap: 0.8vh; margin-top: 0.8vh; position: relative; }
.live-counts-wrap {
  width: 100%; padding: 0.8vh 0; border-top: 2px solid var(--grid-line);
  display: flex; align-items: center; justify-content: center; min-height: 5vh;
}
.live-counts { display: flex; gap: 1.5vw; align-items: center; justify-content: center; flex-wrap: wrap; }
.live-count-item {
  font-size: clamp(10px, 1.3vw, 20px); font-weight: 900;
  display: flex; align-items: baseline; gap: 0.2vw; color: var(--sel);
  transition: transform 0.1s;
}
.live-count-item .v { color: var(--text); }
.live-count-item small { font-size: 0.65em; color: var(--text-light); font-weight: 700; }
.live-counts-empty { font-size: clamp(10px, 1.2vw, 18px); color: var(--muted); font-weight: 700; }
.live-counts-total { font-size: clamp(9px,1.1vw,16px); color: var(--text-light); font-weight: 700; margin-left: 0.5vw; }

.undo-btn {
  position: absolute; bottom: 0; left: 0; background: #f1f5f9; color: var(--text);
  font-weight: 700; font-size: clamp(9px, 1.2vw, 17px);
  border: none; border-radius: 99px; padding: 1.2vh 2vw; cursor: pointer;
  transition: 0.2s; display: flex; align-items: center; gap: 0.4vw; z-index: 10;
}
.undo-btn:active { transform: scale(0.95); background: #e2e8f0; }
.undo-btn:disabled { opacity: 0; pointer-events: none; }
.close-btn {
  position: absolute; bottom: 0; right: 0; background: var(--text); color: #fff;
  font-weight: 700; font-size: clamp(9px, 1.2vw, 17px);
  border: none; border-radius: 99px; padding: 1.2vh 2vw; cursor: pointer;
  transition: 0.2s; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.close-btn:active { transform: scale(0.95); }
.close-btn:disabled { opacity: 0; pointer-events: none; }

/* ── 結果画面 ── */
.r-head { text-align: center; flex-shrink: 0; }
.r-q-title { font-size: clamp(15px, 2.2vw, 32px); font-weight: 900; color: var(--text); margin-top: 0.3vh; }
.r-total-label { position: absolute; bottom: 1.5vh; right: 2vw; font-size: clamp(14px, 1.8vw, 26px); font-weight: 700; color: var(--text-light); z-index: 20; }
.r-total-label b { color: var(--text); font-variant-numeric: tabular-nums; font-size: 1.18em; }
.reset-btn {
  position: absolute; top: 2.5vh; right: 2.5vw; background: #fff;
  border: 2px solid var(--text); color: var(--text);
  border-radius: 99px; padding: 0.8vh 1.8vw; font-weight: 700;
  cursor: pointer; z-index: 20; font-size: clamp(12px, 1.4vw, 18px);
}
.rank1-popup {
  position: absolute; opacity: 0; pointer-events: none;
  transition: opacity 0.4s, transform 0.4s; transform: translateY(6px); z-index: 30;
}
.rank1-popup.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
.rank1-popup-inner {
  background: #fff; border: 2px solid #FFD700; border-radius: 14px; padding: 0.8vh 1.4vw;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 0.5em;
  font-size: clamp(9px,1.1vw,16px); font-weight: 700; color: var(--text);
  cursor: pointer; white-space: nowrap;
}
.rank1-popup-arrow {
  position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
  border-width: 10px 8px 0 8px; border-style: solid;
  border-color: #FFD700 transparent transparent transparent;
}
.rank1-popup-arrow::after {
  content: ''; position: absolute; top: -12px; left: -6px;
  border-width: 10px 6px 0 6px; border-style: solid;
  border-color: #fff transparent transparent transparent;
}

/* ── 声画面 ── */
.voice-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
.voice-title { font-size: clamp(16px, 2.6vw, 36px); font-weight: 900; margin-bottom: 3.5vh; color: #f473a8; }
.voice-title b { color: #f473a8; }
.voice-content { display: flex; align-items: center; justify-content: center; gap: 5vw; width: 100%; }
.silhouette { width: clamp(80px,13vw,180px); height: auto; display: block; flex-shrink: 0; }
.bubbles { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5vw; flex: 1; max-width: 60%; }
.bubble {
  background: #f473a8; padding: 1.2vw; border-radius: 14px; font-weight: 500;
  font-size: clamp(10px, 1.4vw, 20px); border: none; position: relative; color: #fff;
}
.bubble::before { content: ''; position: absolute; top: 50%; left: -10px; transform: translateY(-50%); border-width: 10px 10px 10px 0; border-style: solid; border-color: transparent #f473a8 transparent transparent; }
.bubble::after  { display: none; }
.back-btn {
  margin-top: 6vh; background: transparent; color: #f473a8;
  border: 2px solid #f473a8; border-radius: 99px;
  padding: 1.6vh 3.5vw; font-size: clamp(11px,1.5vw,22px); font-weight: 900;
  cursor: pointer; box-shadow: none;
  transition: transform 0.15s, opacity 0.4s; display: block; width: fit-content;
  margin-left: auto; margin-right: auto; opacity: 0; pointer-events: none;
}
.back-btn.show { opacity: 1; pointer-events: auto; }
.back-btn:active { transform: scale(0.96); }

.timeout-bar-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 3px; z-index: 50; }
.timeout-bar { height: 100%; width: 0%; background: var(--text-light); transition: width linear; opacity: 0.3; }

/* __ADMIN_BACKUP_CSS__ */
.q-head, .r-head { -webkit-touch-callout:none; -webkit-user-select:none; user-select:none; }
.admin-toast{position:fixed;left:50%;bottom:5vh;transform:translateX(-50%) translateY(10px);background:#2c3e50;color:#fff;padding:12px 24px;border-radius:99px;font-weight:700;font-size:clamp(13px,1.6vw,20px);opacity:0;pointer-events:none;transition:opacity .3s,transform .3s;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,.25);}
.admin-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.admin-panel{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .25s;z-index:10000;}
.admin-panel.show{opacity:1;pointer-events:auto;}
.admin-box{background:#fff;border-radius:18px;padding:24px;width:min(86vw,420px);box-shadow:0 20px 60px rgba(0,0,0,.35);display:flex;flex-direction:column;gap:12px;}
.admin-title{font-weight:900;font-size:clamp(16px,2.2vw,24px);color:#2c3e50;text-align:center;margin:0 0 6px;}
.admin-btn{border:none;border-radius:12px;padding:14px;cursor:pointer;font-weight:800;font-size:clamp(13px,1.7vw,19px);background:#2980b9;color:#fff;}
.admin-btn.danger{background:#e74c3c;}
.admin-btn.ghost{background:#ecf0f1;color:#2c3e50;}
</style>
</head>
<body>
<div class="wrap"><div class="card">
  <div class="timeout-bar-wrap"><div class="timeout-bar" id="timeout-bar"></div></div>

  <div class="screen show" id="s-vote">
    <div class="q-head">
      <p class="q-title" id="q-title"></p>
    </div>
    <div class="img-stage-wrap">
      <div class="img-stage" id="vote-stage"></div>
    </div>
    <div class="bottom-area">
      <button class="undo-btn" id="undo-btn" onclick="SE.vote();undoVote()" disabled>↩ 1つ戻す</button>
      <div class="live-counts-wrap"><div class="live-counts" id="live-counts"></div></div>
      <button class="close-btn" id="close-btn" onclick="SE.vote();finishVote()" disabled>結果を見る ➡</button>
    </div>
  </div>

  <div class="screen" id="s-result">
    <button class="reset-btn" onclick="SE.vote();resetAll()">最初に戻る</button>
    <div class="r-head">
      <p class="r-q-title" id="r-title"></p>
    </div>
    <div class="img-stage-wrap">
      <div class="img-stage" id="result-stage"></div>
    </div>
    <p class="r-total-label">総投票数 <b id="r-total-num">0</b> 票</p>
    <div class="rank1-popup" id="rank1-popup" onclick="SE.vote();showVoice()">
      <div class="rank1-popup-inner">🥇 1位を選んだ人の声を見る</div>
      <div class="rank1-popup-arrow"></div>
    </div>
  </div>

  <div class="screen" id="s-voice">
    <div class="voice-layout">
      <div class="voice-title" id="voice-title">1位を選んだ人の声</div>
      <div class="voice-content">
        <svg class="silhouette" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="40" cy="25" r="22" fill="#f473a8"/>
          <path d="M4 98 C4 62 18 52 40 52 C62 52 76 62 76 98 Z" fill="#f473a8"/>
        </svg>
        <div class="bubbles" id="voice-bubbles"></div>
      </div>
      <button class="back-btn" onclick="SE.vote();resetAll()">次の人のために最初の画面に戻る ↩</button>
    </div>
  </div>
</div></div>

const N = SEATS.length;
let sessionVotes = Array(N).fill(0);  // 今セッションの各席の投票数
let sessionTotal = 0;                  // 今セッションの合計投票数（最大MAX_VOTES）
let voteHistory = [];                  // 投票順（戻す用）
let globalVotes = Array(N).fill(0);
let globalTotal = 0;
let isClosed = false;
let timeoutId = null;

const $ = id => document.getElementById(id);
const scr = id => {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('show');
    setTimeout(() => { if (!s.classList.contains('show')) s.style.display = 'none'; }, 300);
  });
  const t = $(id);
  t.style.display = 'flex';
  setTimeout(() => t.classList.add('show'), 50);
};

function loadGlobalData() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(saved) && saved.length === N) globalVotes = saved;
  } catch(e) {}
  globalTotal = globalVotes.reduce((a, b) => a + b, 0);
}

function calcImgRect(img) {
  // object-fit:contain での実描画領域を計算
  const natW = img.naturalWidth  || 1920;
  const natH = img.naturalHeight || 1080;
  const boxW = img.clientWidth, boxH = img.clientHeight;
  const scale = Math.min(boxW / natW, boxH / natH);
  const drawW = natW * scale, drawH = natH * scale;
  const offX = (boxW - drawW) / 2, offY = (boxH - drawH) / 2;
  return { left: offX, top: offY, width: drawW, height: drawH };
}

function positionGrid(img, grid) {
  const r = calcImgRect(img);
  grid.style.left   = r.left   + 'px';
  grid.style.top    = r.top    + 'px';
  grid.style.width  = r.width  + 'px';
  grid.style.height = r.height + 'px';
  grid.style.pointerEvents = 'auto';
}

function buildStage(container, mode) {
  const img = document.createElement('img');
  img.className = 'cafe-img';
  img.src = IMG_SRC;
  if (mode === 'result') img.style.opacity = '0.4';
  container.appendChild(img);

  const grid = document.createElement('div');
  grid.className = 'tap-grid';
  grid.style.pointerEvents = 'none';

  SEATS.forEach(seat => {
    const z = document.createElement(mode === 'vote' ? 'button' : 'div');
    z.className = 'seat-zone';
    z.style.cssText = `left:${seat.left}%;top:${seat.top}%;width:${seat.width}%;height:${seat.height}%;`;

    if (mode === 'vote') {
      const badge = document.createElement('span');
      badge.className = 'zone-badge';
      badge.textContent = seat.num;
      z.appendChild(badge);
    }

    if (mode === 'vote') {
      z.id = 'zone-' + seat.id;
      // 各ゾーンの票数表示
      const tally = document.createElement('span');
      tally.className = 'zone-tally';
      tally.id = 'tally-' + seat.id;
      tally.textContent = '0';
      z.appendChild(tally);
      z.addEventListener('click', () => castVote(seat.id));
    } else {
      z.style.pointerEvents = 'none';
      const res = document.createElement('div');
      res.className = 'zone-result';
      res.id = 'res-' + seat.id;
      res.style.left = seat.cx + '%';
      res.style.top = seat.cy + '%';
      // pct は buildResult 内で動的生成
      z.appendChild(res);
    }
    grid.appendChild(z);
  });
  container.appendChild(grid);

  // img-stage(container) のサイズが確定してから grid を配置
  const reposition = () => {
    if (img.clientWidth > 0) positionGrid(img, grid);
  };
  // ResizeObserver で container を監視（img より確実にサイズが取れる）
  if (window._stageObserver) window._stageObserver.disconnect();
  window._stageObserver = new ResizeObserver(() => reposition());
  window._stageObserver.observe(container);
  // 初回: rAF を2段重ねてレイアウト確定後に実行
  requestAnimationFrame(() => requestAnimationFrame(reposition));
}

// 投票（タップごとに1票加算、MAX_VOTESまで）
function castVote(id) {
  if (isClosed || sessionTotal >= MAX_VOTES) return;

  SE.vote();
  sessionVotes[id]++;
  sessionTotal++;
  voteHistory.push(id);

  // バッジ票数を更新
  const tally = $('tally-' + id);
  tally.textContent = sessionVotes[id];
  tally.classList.add('on');

  // フラッシュ＋選択枠
  const el = $('zone-' + id);
  el.classList.add('selected', 'flash');
  setTimeout(() => el.classList.remove('flash'), 180);

  renderLiveCounts();
  const lc = $('lc-' + id);
  if (lc) { lc.style.transform = 'scale(1.25)'; setTimeout(() => lc.style.transform = 'scale(1)', 150); }
  updateStatus();

  // 10人到達で自動的に結果へ
  if (sessionTotal >= MAX_VOTES) {
    setTimeout(finishVote, 500);
  }
}

// 1つ戻す
function undoVote() {
  if (isClosed || voteHistory.length === 0) return;
  const id = voteHistory.pop();
  sessionVotes[id]--;
  sessionTotal--;

  const tally = $('tally-' + id);
  tally.textContent = sessionVotes[id];
  if (sessionVotes[id] === 0) {
    tally.classList.remove('on');
    $('zone-' + id).classList.remove('selected');
  }
  renderLiveCounts();
  updateStatus();
}

function renderLiveCounts() {
  const box = $('live-counts');
  const voted = SEATS.filter(s => sessionVotes[s.id] > 0);
  if (voted.length === 0) {
    box.innerHTML = '<span class="live-counts-empty">画面をタップして選んでね</span>';
    return;
  }
  box.innerHTML = voted.map(s =>
    `<span class="live-count-item" id="lc-${s.id}">No.${s.num} <span class="v">${sessionVotes[s.id]}<small>票</small></span></span>`
  ).join('');
}


function updateStatus() {
  $('undo-btn').disabled = voteHistory.length === 0;
  $('close-btn').disabled = sessionTotal === 0;
}

function finishVote() {
  if (sessionTotal === 0 || isClosed) return;
  isClosed = true;
  $('undo-btn').disabled = true;
  $('close-btn').disabled = true;

  for (let i = 0; i < N; i++) globalVotes[i] += sessionVotes[i];
  globalTotal += sessionTotal;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(globalVotes));
  setTimeout(buildResult, 400);
}

function animateValue(el, end, duration, suffix, onDone) {
  if (!el) return;
  let t0 = null;
  const step = ts => {
    if (!t0) t0 = ts;
    const p = Math.min((ts - t0) / duration, 1);
    el.textContent = Math.floor((1 - Math.pow(1 - p, 3)) * end) + suffix;
    if (p < 1) {
      requestAnimationFrame(step);
    } else {
      el.textContent = end + suffix;
      if (onDone) onDone();
    }
  };
  requestAnimationFrame(step);
}

function buildResult() {
  $('r-title').textContent = QUESTION.title;
  $('r-total-num').textContent = globalTotal.toLocaleString();
  $('result-stage').innerHTML = '';
  buildStage($('result-stage'), 'result');
  scr('s-result');
  startTimer();

  const maxV = Math.max(...globalVotes);
  const sv = [...globalVotes].filter(v => v > 0).sort((a, b) => b - a);
  const r1 = sv[0]||0, r2 = sv.find(v=>v<r1)||0, r3 = sv.find(v=>v<r2)||0;
  const rc = {[r1]:'rank-1',[r2]:'rank-2',[r3]:'rank-3'};
  const cm = {[r1]:'🥇',[r2]:'🥈',[r3]:'🥉'};

  setTimeout(() => {
    SE.graph();
    setTimeout(() => SE.bell(), 2100);
    for (let i = 0; i < N; i++) {
      const pct = globalTotal > 0 ? Math.round(globalVotes[i] / globalTotal * 100) : 0;
      const res = $('res-' + i);
      res.classList.add('show');
      if (globalVotes[i] > 0 && rc[globalVotes[i]]) {
        // 1〜3位：メダル＋%
        res.classList.add(rc[globalVotes[i]]);
        const medal = document.createElement('span');
        medal.className = 'zone-medal';
        medal.textContent = cm[globalVotes[i]];
        const pctEl = document.createElement('span');
        pctEl.className = 'pct';
        res.appendChild(medal);
        res.appendChild(pctEl);
        animateValue(pctEl, pct, 2000, '%', () => {
          pctEl.classList.remove('pop'); void pctEl.offsetWidth; pctEl.classList.add('pop');
        });
      } else {
        // ランク外：%のみ
        const pctEl = document.createElement('span');
        pctEl.className = 'pct';
        res.appendChild(pctEl);
        animateValue(pctEl, pct, 2000, '%', () => {
          pctEl.classList.remove('pop'); void pctEl.offsetWidth; pctEl.classList.add('pop');
        });
      }
    }
  }, 300);

  let winnerIdx = globalVotes.indexOf(maxV);
  if (winnerIdx < 0) winnerIdx = 0;
  buildVoice(winnerIdx);

  const popup = $('rank1-popup');
  popup.classList.remove('show');
  setTimeout(() => {
    const stage = $('result-stage');
    const card = stage.closest('.card');
    if (!stage || !card) { popup.classList.add('show'); return; }
    const sr = stage.getBoundingClientRect();
    const cr = card.getBoundingClientRect();
    const seat = SEATS[winnerIdx];
    const zL = sr.left - cr.left + (seat.left / 100) * sr.width;
    const zW = (seat.width / 100) * sr.width;
    const zT = sr.top - cr.top + (seat.top / 100) * sr.height;

    const pw = popup.offsetWidth || 220;
    const ph = popup.offsetHeight || 48;
    const GAP = 14, M = 4, PAD = 6;

    // すべての表示中の%バッジ＋総投票数ラベル＋戻るボタンの矩形（カード座標・余白付き）
    const avoidEls = Array.from(document.querySelectorAll('.zone-result.show'));
    ['.r-total-label', '.reset-btn'].forEach(sel => {
      const el = card.querySelector(sel);
      if (el) avoidEls.push(el);
    });
    const badges = avoidEls.map(el => {
      const r = el.getBoundingClientRect();
      return {
        l: r.left - cr.left - PAD, t: r.top - cr.top - PAD,
        r: r.right - cr.left + PAD, b: r.bottom - cr.top + PAD
      };
    });
    const overlaps = (l, t) =>
      badges.some(b => !(l + pw <= b.l || l >= b.r || t + ph <= b.t || t >= b.b));

    // 理想位置：1位の席の真上・水平中央
    let desiredLeft = zL + zW / 2 - pw / 2;
    desiredLeft = Math.max(M, Math.min(desiredLeft, cr.width - pw - M));
    const desiredTop = zT - ph - GAP;

    // どの席が1位でも%に被らない位置を探索（理想位置に最も近い空き位置を採用）
    const leftCandidates = [desiredLeft, M, cr.width - pw - M]
      .filter((v, i, a) => a.indexOf(v) === i);
    const minTop = M, maxTop = Math.max(M, cr.height - ph - M);
    let best = null, bestDist = Infinity;
    for (const l of leftCandidates) {
      for (let t = minTop; t <= maxTop; t += 4) {
        if (!overlaps(l, t)) {
          const dist = Math.abs(t - desiredTop) + Math.abs(l - desiredLeft) * 0.5;
          if (dist < bestDist) { bestDist = dist; best = { l, t }; }
        }
      }
    }
    if (!best) best = { l: desiredLeft, t: Math.max(minTop, Math.min(desiredTop, maxTop)) };

    popup.style.left = best.l + 'px';
    popup.style.top = best.t + 'px';

    // 矢印は「席の真上に出たとき」だけ表示（席を指す）。離れた位置では非表示にする
    const arrow = popup.querySelector('.rank1-popup-arrow');
    if (arrow) {
      const overSeatX = best.l < zL + zW && best.l + pw > zL;
      const justAbove = best.t + ph <= zT + 2;
      arrow.style.display = (overSeatX && justAbove) ? '' : 'none';
    }
    popup.classList.add('show');
  }, 2600);
}

function buildVoice(winnerIdx) {
  $('voice-title').innerHTML = '<b>1位</b>を選んだ人の声';
  const box = $('voice-bubbles');
  box.innerHTML = '';
  SEATS[winnerIdx].voices.slice(0, 4).forEach(t => {
    box.innerHTML += `<div class="bubble">${t}</div>`;
  });
}

function showVoice() {
  scr('s-voice');
  stopTimer();
  const bar = $('timeout-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  setTimeout(() => { bar.style.transition = 'width 10s linear'; bar.style.width = '100%'; }, 50);
  timeoutId = setTimeout(resetAll, 10000);
  const btn = document.querySelector('.back-btn');
  btn.classList.remove('show');
  setTimeout(() => btn.classList.add('show'), 1500);
}

function startTimer() {
  clearTimeout(timeoutId);
  const bar = $('timeout-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  setTimeout(() => { bar.style.transition = `width ${TIMEOUT_SEC}s linear`; bar.style.width = '100%'; }, 50);
  timeoutId = setTimeout(resetAll, TIMEOUT_SEC * 1000);
}
function stopTimer() {
  clearTimeout(timeoutId);
  const bar = $('timeout-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
}
function resetAll() {
  sessionVotes = Array(N).fill(0); sessionTotal = 0; voteHistory = [];
  isClosed = false;
  stopTimer(); init(); scr('s-vote');
}
function init() {
  loadGlobalData();
  $('q-title').textContent = QUESTION.title;
  $('vote-stage').innerHTML = '';
  buildStage($('vote-stage'), 'vote');
  renderLiveCounts();
  updateStatus();
}
init();

// ── サウンドエンジン ──
const SE = (() => {
  function _c() {
    const C = window.AudioContext || window.webkitAudioContext;
    const ctx = new C();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  // ボタン共通クリック・投票音（se_button_01 ポップ標準）
  function vote() {
    const c = _c(), t = c.currentTime;
    const o = c.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(660, t);
    o.frequency.exponentialRampToValueAtTime(880, t + 0.16);
    const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 3000;
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.35, t + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(f); f.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.2);
  }

  // グラフ展開音（se_graph_09 ホイッスル上昇）
  function graph() {
    const c = _c(), t = c.currentTime;
    const o = c.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(400, t);
    o.frequency.exponentialRampToValueAtTime(1600, t + 0.8);
    const g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.25, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
    o.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t + 0.85);
  }

  // 結果確定ベル（se_graph_22 ライジングベル）
  function bell() {
    const N = { C5: 523.3, E5: 659.3, G5: 784, C6: 1046.5 };
    const c = _c(), t = c.currentTime;
    function _b(freq, delay, dur, gain) {
      [1, 2.01, 3.0].forEach((r, i) => {
        const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = freq * r;
        const g = c.createGain();
        g.gain.setValueAtTime(0.0001, t + delay);
        g.gain.linearRampToValueAtTime(gain * [1, .5, .25][i], t + delay + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0001, t + delay + dur * [1, .7, .45][i]);
        o.connect(g); g.connect(c.destination);
        o.start(t + delay); o.stop(t + delay + dur + 0.05);
      });
    }
    [N.C5, N.E5, N.G5, N.C6].forEach((f, i) => _b(f, i * 0.11, 0.3, 0.14));
  }

  return { vote, graph, bell };
})();

/* __ADMIN_BACKUP_BLOCK__ */
(function(){
  if (typeof STORAGE_KEY === 'undefined') return;
  var DAILY_KEY = STORAGE_KEY + '_daily';
  var BK_DATE_KEY = STORAGE_KEY + '_lastbk';
  function todayStr(){var d=new Date(),z=function(n){return String(n).padStart(2,'0');};
    return d.getFullYear()+'-'+z(d.getMonth()+1)+'-'+z(d.getDate());}
  function loadDaily(){try{var o=JSON.parse(localStorage.getItem(DAILY_KEY));return (o&&typeof o==='object')?o:{};}catch(e){return {};}}
  function recordDaily(votes){if(!votes)return;var d=loadDaily(),k=todayStr(),n=votes.length;
    if(!Array.isArray(d[k])||d[k].length!==n)d[k]=new Array(n).fill(0);
    for(var i=0;i<n;i++)d[k][i]+=votes[i];
    try{localStorage.setItem(DAILY_KEY,JSON.stringify(d));}catch(e){}}
  function labels(){var arr=(typeof CHOICES!=='undefined')?CHOICES:((typeof SEATS!=='undefined')?SEATS:[]);
    return arr.map(function(c,i){return (c&&(c.label||c.name))?(c.label||c.name).replace(/\n/g,' '):('選択肢'+(i+1));});}
  function buildCSV(){var d=loadDaily(),labs=labels();
    var header=['日付'].concat(labs).concat(['合計']);var rows=[header.join(',')];
    Object.keys(d).sort().forEach(function(date){var a=d[date];var t=a.reduce(function(x,y){return x+y;},0);
      rows.push([date].concat(a).concat([t]).join(','));});
    var gv=(typeof globalVotes!=='undefined')?globalVotes:[];var gt=(typeof globalTotal!=='undefined')?globalTotal:0;
    rows.push(['累計'].concat(gv).concat([gt]).join(','));
    return '\uFEFF'+rows.join('\r\n');}
  function downloadCSV(fn){var blob=new Blob([buildCSV()],{type:'text/csv;charset=utf-8;'});
    var url=URL.createObjectURL(blob),a=document.createElement('a');
    a.href=url;a.download=fn;document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(function(){URL.revokeObjectURL(url);},1000);}
  function maybeAutoBackup(){var last=localStorage.getItem(BK_DATE_KEY),t=todayStr();
    if(last&&last!==t){try{downloadCSV('backup_'+STORAGE_KEY+'_'+t+'.csv');}catch(e){}}
    try{localStorage.setItem(BK_DATE_KEY,t);}catch(e){}}
  function showToast(msg){var t=document.getElementById('admin-toast');
    if(!t){t=document.createElement('div');t.id='admin-toast';t.className='admin-toast';document.body.appendChild(t);}
    t.textContent=msg;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(function(){t.classList.remove('show');},2200);}
  function clearAllData(){try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
    try{localStorage.removeItem(DAILY_KEY);}catch(e){}
    if(typeof globalVotes!=='undefined'){for(var i=0;i<globalVotes.length;i++)globalVotes[i]=0;}
    if(typeof globalTotal!=='undefined'){globalTotal=0;}
    if(typeof resetAll==='function'){resetAll();}else if(typeof init==='function'){init();}
    if(typeof scr==='function'){scr('s-vote');}}
  function adminClear(){if(window.confirm('累計の投票データをすべて削除します。\nこの操作は取り消せません。よろしいですか？')){clearAllData();showToast('投票データを削除しました');}}
  function openPanel(){var ov=document.getElementById('admin-panel');
    if(ov){ov.classList.add('show');return;}
    ov=document.createElement('div');ov.id='admin-panel';ov.className='admin-panel';
    ov.innerHTML='<div class="admin-box"><p class="admin-title">管理メニュー</p>'+
      '<button class="admin-btn" data-act="backup">バックアップを保存（CSV）</button>'+
      '<button class="admin-btn danger" data-act="clear">累計データを全削除</button>'+
      '<button class="admin-btn ghost" data-act="close">閉じる</button></div>';
    document.body.appendChild(ov);
    ov.addEventListener('click',function(e){var act=e.target&&e.target.dataset?e.target.dataset.act:null;
      if(e.target===ov||act==='close'){ov.classList.remove('show');return;}
      if(act==='backup'){downloadCSV('backup_'+STORAGE_KEY+'_'+todayStr()+'.csv');showToast('バックアップを保存しました');ov.classList.remove('show');}
      else if(act==='clear'){ov.classList.remove('show');adminClear();}});
    requestAnimationFrame(function(){ov.classList.add('show');});}
  function attachLP(el,ms,cb){if(!el)return;var timer=null;
    el.addEventListener('pointerdown',function(){timer=setTimeout(cb,ms);});
    ['pointerup','pointerleave','pointercancel'].forEach(function(ev){el.addEventListener(ev,function(){if(timer){clearTimeout(timer);timer=null;}});});
    el.addEventListener('contextmenu',function(e){e.preventDefault();});}
  if(typeof window.finishVote==='function'){
    var _orig=window.finishVote;
    window.finishVote=function(){
      var snap=(typeof sessionVotes!=='undefined'&&sessionVotes)?sessionVotes.slice():null;
      var before=(typeof globalTotal!=='undefined')?globalTotal:0;
      var r=_orig.apply(this,arguments);
      if(snap&&typeof globalTotal!=='undefined'&&globalTotal>before){recordDaily(snap);maybeAutoBackup();}
      return r;
    };
  }
  try{if(!localStorage.getItem(BK_DATE_KEY))localStorage.setItem(BK_DATE_KEY,todayStr());}catch(e){}
  attachLP(document.querySelector('.q-head'),5000,openPanel);
  attachLP(document.querySelector('.r-head'),5000,openPanel);
  window.__buildCSV=buildCSV;window.__openPanel=openPanel;window.__clearAllData=clearAllData;
})();
</script>
