<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>投票 - 修学旅行のバスどこ座る？</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f6f9; --card-bg: #ffffff; --text: #2c3e50; --text-light: #64748b;
  --muted: #cbd5e1; --grid-line: #e2e8f0; --accent: #ec407a;
  --sel: #3b82f6; --shadow: 0 10px 40px rgba(0,0,0,0.06);
}
body {
  font-family: 'Noto Sans JP', sans-serif; background: var(--bg);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; -webkit-user-select: none; user-select: none;
}
.wrap { width: 100vw; max-width: 100vw; aspect-ratio: 16/9; max-height: 100vh; padding: 2vw; }
.card {
  background: var(--card-bg); width: 100%; height: 100%;
  border-radius: 24px; box-shadow: var(--shadow); padding: 2.5% 3.5%;
  display: flex; flex-direction: column; position: relative; overflow: hidden;
}
.screen {
  display: none; flex-direction: column; flex: 1; width: 100%; height: 100%;
  opacity: 0; transition: opacity 0.4s ease;
}
.screen.show { display: flex; opacity: 1; }

/* ── 投票画面 ── */
#s-vote { justify-content: space-between; }
.q-head { text-align: center; }
.q-number { display: none; }
.q-title { font-size: clamp(18px, 2.8vw, 40px); font-weight: 900; color: var(--text); line-height: 1.3; margin-top: 0.4vh; position: relative; top: -3pt; }
.q-sub { display: none; }

/* 画像ステージ */
.img-stage-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; padding: 0.8vh 0; }
.img-stage { position: relative; height: 100%; max-width: 100%; aspect-ratio: 1920/1080; }
.cafe-img { width: 100%; height: 100%; object-fit: contain; display: block; border-radius: 10px; }

.tap-grid {
  position: absolute;
  pointer-events: none; /* JS でサイズセット後に auto に変える */
}

/* 座席ゾーン */
.seat-zone {
  position: absolute; background: transparent; border: none; cursor: pointer;
  -webkit-tap-highlight-color: transparent; border-radius: 6px;
  transition: background 0.15s, box-shadow 0.15s; outline: none;
}
@media (hover: hover) {
  .seat-zone:hover { background: rgba(59,130,246,0.05); }
}
.seat-zone.selected {
  background: transparent;
  box-shadow: none;
}
.seat-zone.flash { background: rgba(59,130,246,0.18); }

/* 番号バッジ（常時表示） */
.zone-badge {
  position: absolute; top: 6%; left: 50%; transform: translateX(-50%);
  background: #f473a8; color: #fff;
  font-size: clamp(11px, 1.3vw, 18px); font-weight: 700;
  border-radius: 50%; width: clamp(14px, 1.6vw, 22px); height: clamp(14px, 1.6vw, 22px);
  display: flex; align-items: center; justify-content: center;
  box-shadow: none; pointer-events: none;
  transition: background 0.15s; z-index: 3;
}
.seat-zone.selected .zone-badge { background: #f473a8; filter: brightness(1.15); }

/* このゾーンの現在票数（投票中に表示） */
.zone-tally { display: none; }
.zone-tally.on { display: none; }

/* 結果オーバーレイ */
.zone-result {
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%) scale(0.7);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 1px;
  pointer-events: none; opacity: 0;
  transition: opacity 0.5s, transform 0.5s cubic-bezier(0.2,0.8,0.2,1);
  white-space: nowrap;
}
.zone-result.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
.zone-result .pct {
  font-size: clamp(9px, 1.3vw, 20px); font-weight: 900; color: var(--text);
  text-shadow: 0 1px 0 #fff, 0 0 6px #fff; font-variant-numeric: tabular-nums;
  background: rgba(255,255,255,0.7); border-radius: 4px; padding: 1px 4px;
}
.zone-result.rank-1 { background: rgba(255,215,0,0.15); box-shadow: inset 0 0 0 1.5px rgba(255,215,0,0.6); border-radius: 8px; padding: 2px 6px; }
.zone-result.rank-1 .pct { color: #B8860B; }
.zone-result.rank-2 { background: rgba(192,192,192,0.15); box-shadow: inset 0 0 0 1.5px rgba(192,192,192,0.6); border-radius: 8px; padding: 2px 6px; }
.zone-result.rank-2 .pct { color: #808080; }
.zone-result.rank-3 { background: rgba(205,127,50,0.15); box-shadow: inset 0 0 0 1.5px rgba(205,127,50,0.6); border-radius: 8px; padding: 2px 6px; }
.zone-result.rank-3 .pct { color: #A0522D; }
.zone-crown { display: none; }
.zone-medal {
  font-size: clamp(13px, 1.8vw, 28px); line-height: 1;
  pointer-events: none; display: block; text-align: center;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,0.25));
}
.zone-votes {
  font-size: clamp(8px, 0.9vw, 13px); font-weight: 900;
  color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,0.6);
  background: rgba(0,0,0,0.35); border-radius: 99px; padding: 0 5px;
  display: none; pointer-events: none; display: block; text-align: center; margin-top: 2px;
  white-space: nowrap;
}

/* 下部 */
.bottom-area { display: flex; flex-direction: column; align-items: center; gap: 0.8vh; margin-top: 0.8vh; position: relative; }
.live-counts-wrap {
  width: 100%; padding: 0.8vh 0; border-top: 2px solid var(--grid-line);
  display: flex; align-items: center; justify-content: center; min-height: 5vh;
}
.live-counts { display: flex; gap: 1.5vw; align-items: center; justify-content: center; flex-wrap: wrap; }
.live-count-item {
  font-size: clamp(10px, 1.3vw, 20px); font-weight: 900;
  display: flex; align-items: baseline; gap: 0.2vw; color: var(--sel);
  transition: transform 0.1s;
}
.live-count-item .v { color: var(--text); }
.live-count-item small { font-size: 0.65em; color: var(--text-light); font-weight: 700; }
.live-counts-empty { font-size: clamp(10px, 1.2vw, 18px); color: var(--muted); font-weight: 700; }
.live-counts-total { font-size: clamp(9px,1.1vw,16px); color: var(--text-light); font-weight: 700; margin-left: 0.5vw; }

.undo-btn {
  position: absolute; bottom: 0; left: 0; background: #f1f5f9; color: var(--text);
  font-weight: 700; font-size: clamp(9px, 1.2vw, 17px);
  border: none; border-radius: 99px; padding: 1.2vh 2vw; cursor: pointer;
  transition: 0.2s; display: flex; align-items: center; gap: 0.4vw; z-index: 10;
}
.undo-btn:active { transform: scale(0.95); background: #e2e8f0; }
.undo-btn:disabled { opacity: 0; pointer-events: none; }
.close-btn {
  position: absolute; bottom: 0; right: 0; background: var(--text); color: #fff;
  font-weight: 700; font-size: clamp(9px, 1.2vw, 17px);
  border: none; border-radius: 99px; padding: 1.2vh 2vw; cursor: pointer;
  transition: 0.2s; z-index: 10; box-shadow: 0 4px 10px rgba(0,0,0,0.15);
}
.close-btn:active { transform: scale(0.95); }
.close-btn:disabled { opacity: 0; pointer-events: none; }

/* ── 結果画面 ── */
.r-head { text-align: center; flex-shrink: 0; }
.r-q-title { font-size: clamp(18px, 2.8vw, 40px); font-weight: 900; color: var(--text); line-height: 1.3; white-space: pre-line; margin-top: 0.4vh; position: relative; top: -3pt; }
.result-total { text-align: left; font-size: clamp(14px, 1.8vw, 24px); font-weight: 900; color: var(--text-light); }
.result-total b { color: var(--text); font-size: 1.3em; font-variant-numeric: tabular-nums; }
/* 結果画面の総投票数を右下へ */
#s-result .bottom-area { position: absolute; top: 4vh; left: 3vw; margin: 0; width: auto; }
#s-result .live-counts-wrap { border-top: none; padding: 0; min-height: 0; width: auto; justify-content: flex-end; }
#s-result .result-total { text-align: left; }
/* 数字確定時のポップ演出 */
.zone-result .pct.pop { animation: pctPop 0.42s cubic-bezier(0.2, 0.8, 0.2, 1); }
@keyframes pctPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.4); color: var(--pop-c, var(--accent)); }
  100% { transform: scale(1); }
}
.reset-btn {
  position: absolute; top: 2.5vh; right: 2.5vw; background: #fff; border: 2px solid var(--text);
  color: var(--text); border-radius: 99px; padding: 0.8vh 1.8vw; font-weight: 700;
  cursor: pointer; z-index: 20; font-size: clamp(12px, 1.4vw, 18px);
}
.rank1-popup {
  position: absolute; opacity: 0; pointer-events: none;
  transition: opacity 0.4s, transform 0.4s; transform: translateY(6px); z-index: 30;
}
.rank1-popup.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
.rank1-popup-inner {
  background: #3d3d3d; border: none; border-radius: 12px; padding: 1vh 1.8vw;
  box-shadow: 0 6px 24px rgba(0,0,0,0.28); display: flex; align-items: center; gap: 0.5em;
  font-size: clamp(10px,1.2vw,18px); font-weight: 900; color: #fff;
  cursor: pointer; white-space: nowrap; letter-spacing: 0.02em;
}
.rank1-popup-arrow {
  position: absolute; bottom: -9px; left: 50%; transform: translateX(-50%);
  border-width: 9px 7px 0 7px; border-style: solid;
  border-color: #3d3d3d transparent transparent transparent;
}

/* ── 声画面 ── */
.voice-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
.voice-title { font-size: clamp(22px, 3.5vw, 52px); font-weight: 900; margin-bottom: 2vh; color: #f473a8; letter-spacing: -0.01em; }
.voice-content { display: flex; align-items: center; justify-content: center; gap: 4vw; width: 100%; }
.silhouette { width: clamp(90px, 11vw, 160px); flex-shrink: 0; }
.silhouette svg { width: 100%; height: auto; display: block; }
.bubbles { display: grid; grid-template-columns: 1fr 1fr; gap: 1.4vw; flex: 1; max-width: 62%; }
.bubble {
  background: #f473a8; padding: 1.3vw 1.6vw; border-radius: 18px; font-weight: 700;
  font-size: clamp(10px, 1.3vw, 19px); border: none; position: relative; color: #fff;
  line-height: 1.5;
}
.bubble::before { content: ''; position: absolute; top: 50%; left: -11px; transform: translateY(-50%); border-width: 11px 11px 11px 0; border-style: solid; border-color: transparent #f473a8 transparent transparent; }
.bubble::after  { display: none; }
.back-btn {
  margin-top: 5vh; background: #fff; color: var(--text); border: 2px solid var(--text); border-radius: 99px;
  padding: 1.4vh 3.5vw; font-size: clamp(11px,1.4vw,20px); font-weight: 700;
  cursor: pointer; box-shadow: none;
  transition: transform 0.15s, opacity 0.4s; display: block; width: fit-content;
  margin-left: auto; margin-right: auto; opacity: 0; pointer-events: none;
}
.back-btn.show { opacity: 1; pointer-events: auto; }
.back-btn:active { transform: scale(0.96); }

.timeout-bar-wrap { position: absolute; top: 0; left: 0; width: 100%; height: 3px; z-index: 50; }
.timeout-bar { height: 100%; width: 0%; background: var(--text-light); transition: width linear; opacity: 0.3; }
</style>
</head>
<body>
<div class="wrap"><div class="card">
  <div class="timeout-bar-wrap"><div class="timeout-bar" id="timeout-bar"></div></div>

  <div class="screen show" id="s-vote">
    <div class="q-head">
      <p class="q-title" id="q-title"></p>
    </div>
    <div class="img-stage-wrap">
      <div class="img-stage" id="vote-stage"></div>
    </div>
    <div class="bottom-area">
      <button class="undo-btn" id="undo-btn" onclick="SE.vote();undoVote()" disabled>↩ 1つ戻す</button>
      <div class="live-counts-wrap"><div class="live-counts" id="live-counts"></div></div>
      <button class="close-btn" id="close-btn" onclick="SE.vote();finishVote()" disabled>結果を見る ➡</button>
    </div>
  </div>

  <div class="screen" id="s-result">
    <button class="reset-btn" onclick="SE.vote();resetAll()">最初に戻る</button>
    <div class="r-head">
      <p class="r-q-title" id="r-title"></p>
    </div>
    <div class="img-stage-wrap">
      <div class="img-stage" id="result-stage"></div>
    </div>
    <div class="bottom-area">
      <div class="live-counts-wrap">
        <div class="result-total">総投票数 <b id="r-total">0</b> 票</div>
      </div>
    </div>
    <div class="rank1-popup" id="rank1-popup" onclick="SE.vote();showVoice()">
      <div class="rank1-popup-inner">1位を選んだ人の声 💬</div>
      <div class="rank1-popup-arrow"></div>
    </div>
  </div>

  <div class="screen" id="s-voice">
    <div class="voice-layout">
      <div class="voice-title" id="voice-title">1位を選んだ人の声</div>
      <div class="voice-content">
        <div class="silhouette">
          <svg viewBox="0 0 200 220" xmlns="http://www.w3.org/2000/svg">

            <path d="M0,220 C0,162 36,124 100,124 C164,124 200,162 200,220 Z" fill="#9AA6B0"/>
          </svg>
        </div>
        <div class="bubbles" id="voice-bubbles"></div>
      </div>
      <button class="back-btn" onclick="SE.vote();resetAll()">次の人のために最初の画面に戻る</button>
    </div>
  </div>
</div></div>

<script>
/* ===== SE エンジン（Web Audio API・外部ファイル不要） ===== */
const SE = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  // 投票タップ：木琴っぽい温かいポン音
  function vote() {
    try {
      const c = ac(), t = c.currentTime;
      const o = c.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(660, t);
      o.frequency.exponentialRampToValueAtTime(880, t + 0.16);
      const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 3000;
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.35, t + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
      o.connect(f); f.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + 0.2);
    } catch(e) {}
  }
  // 結果アニメ：高揚する上昇スウィープ（ウープ系）
  function graph() {
    try {
      const c = ac(), t = c.currentTime;
      const o = c.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(400, t);
      o.frequency.exponentialRampToValueAtTime(1600, t + 0.8);
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + 0.85);
    } catch(e) {}
  }
  // 結果発表：お祝いのベル分散和音
  function bell() {
    try {
      const c = ac(), t = c.currentTime;
      const N = {C5:523.3, E5:659.3, G5:784, C6:1046.5};
      function _bell(freq, t0, dur, gain) {
        [1, 2.01, 3.0].forEach((r, i) => {
          const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = freq * r;
          const g = c.createGain();
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.linearRampToValueAtTime(gain * [1, .5, .25][i], t0 + 0.005);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur * [1, .7, .45][i]);
          o.connect(g); g.connect(c.destination);
          o.start(t0); o.stop(t0 + dur + 0.05);
        });
      }
      [N.C5, N.E5, N.G5, N.C6].forEach((f, i) => _bell(f, t + i * 0.11, 0.3, 0.14));
    } catch(e) {}
  }
  return { vote, graph, bell };
})();

const N = SEATS.length;
let sessionVotes = Array(N).fill(0);  // 今セッションの各席の投票数
let sessionTotal = 0;                  // 今セッションの合計投票数（最大MAX_VOTES）
let voteHistory = [];                  // 投票順（戻す用）
let globalVotes = Array(N).fill(0);
let globalTotal = 0;
let isClosed = false;
let timeoutId = null;

const $ = id => document.getElementById(id);
const scr = id => {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('show');
    setTimeout(() => { if (!s.classList.contains('show')) s.style.display = 'none'; }, 300);
  });
  const t = $(id);
  t.style.display = 'flex';
  setTimeout(() => t.classList.add('show'), 50);
};

function loadGlobalData() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(saved) && saved.length === N) globalVotes = saved;
  } catch(e) {}
  globalTotal = globalVotes.reduce((a, b) => a + b, 0);
}

function calcImgRect(img) {
  // object-fit:contain での実描画領域を計算
  const natW = img.naturalWidth  || 1920;
  const natH = img.naturalHeight || 1080;
  const boxW = img.clientWidth, boxH = img.clientHeight;
  const scale = Math.min(boxW / natW, boxH / natH);
  const drawW = natW * scale, drawH = natH * scale;
  const offX = (boxW - drawW) / 2, offY = (boxH - drawH) / 2;
  return { left: offX, top: offY, width: drawW, height: drawH };
}

function positionGrid(img, grid) {
  const r = calcImgRect(img);
  grid.style.left   = r.left   + 'px';
  grid.style.top    = r.top    + 'px';
  grid.style.width  = r.width  + 'px';
  grid.style.height = r.height + 'px';
  grid.style.pointerEvents = 'auto';
}

function buildStage(container, mode) {
  const img = document.createElement('img');
  img.className = 'cafe-img';
  img.src = IMG_SRC;
  if (mode === 'result') img.style.opacity = '0.4';
  container.appendChild(img);

  const grid = document.createElement('div');
  grid.className = 'tap-grid';
  grid.style.pointerEvents = 'none';

  SEATS.forEach(seat => {
    const z = document.createElement(mode === 'vote' ? 'button' : 'div');
    z.className = 'seat-zone';
    z.style.cssText = `left:${seat.left}%;top:${seat.top}%;width:${seat.width}%;height:${seat.height}%;`;

    if (mode === 'vote') {
      const badge = document.createElement('span');
      badge.className = 'zone-badge';
      badge.textContent = seat.num;
      z.appendChild(badge);
    }

    if (mode === 'vote') {
      z.id = 'zone-' + seat.id;
      // 各ゾーンの票数表示
      const tally = document.createElement('span');
      tally.className = 'zone-tally';
      tally.id = 'tally-' + seat.id;
      tally.textContent = '0';
      z.appendChild(tally);
      z.addEventListener('click', () => castVote(seat.id));
    } else {
      z.style.pointerEvents = 'none';
      const res = document.createElement('div');
      res.className = 'zone-result';
      res.id = 'res-' + seat.id;
      res.style.left = seat.cx + '%';
      res.style.top = seat.cy + '%';
      // pct は buildResult 内で動的生成
      z.appendChild(res);
    }
    grid.appendChild(z);
  });
  container.appendChild(grid);

  // img-stage(container) のサイズが確定してから grid を配置
  const reposition = () => {
    if (img.clientWidth > 0) positionGrid(img, grid);
  };
  // ResizeObserver で container を監視（img より確実にサイズが取れる）
  if (window._stageObserver) window._stageObserver.disconnect();
  window._stageObserver = new ResizeObserver(() => reposition());
  window._stageObserver.observe(container);
  // 初回: rAF を2段重ねてレイアウト確定後に実行
  requestAnimationFrame(() => requestAnimationFrame(reposition));
}

// 投票（タップごとに1票加算、MAX_VOTESまで）
function castVote(id) {
  if (isClosed || sessionTotal >= MAX_VOTES) return;
  SE.vote();

  sessionVotes[id]++;
  sessionTotal++;
  voteHistory.push(id);

  // バッジ票数を更新
  const tally = $('tally-' + id);
  tally.textContent = sessionVotes[id];
  tally.classList.add('on');

  // フラッシュ＋選択枠
  const el = $('zone-' + id);
  el.classList.add('selected', 'flash');
  setTimeout(() => el.classList.remove('flash'), 180);

  renderLiveCounts();
  const lc = $('lc-' + id);
  if (lc) { lc.style.transform = 'scale(1.25)'; setTimeout(() => lc.style.transform = 'scale(1)', 150); }
  updateStatus();

  // 10人到達で自動的に結果へ
  if (sessionTotal >= MAX_VOTES) {
    setTimeout(finishVote, 500);
  }
}

// 1つ戻す
function undoVote() {
  if (isClosed || voteHistory.length === 0) return;
  const id = voteHistory.pop();
  sessionVotes[id]--;
  sessionTotal--;

  const tally = $('tally-' + id);
  tally.textContent = sessionVotes[id];
  if (sessionVotes[id] === 0) {
    tally.classList.remove('on');
    $('zone-' + id).classList.remove('selected');
  }
  renderLiveCounts();
  updateStatus();
}

function renderLiveCounts() {
  const box = $('live-counts');
  const voted = SEATS.filter(s => sessionVotes[s.id] > 0);
  if (voted.length === 0) {
    box.innerHTML = '<span class="live-counts-empty">画面をタップして選んでね</span>';
    return;
  }
  box.innerHTML = voted.map(s =>
    `<span class="live-count-item" id="lc-${s.id}">No.${s.num} <span class="v">${sessionVotes[s.id]}<small>票</small></span></span>`
  ).join('');
}


function updateStatus() {
  $('undo-btn').disabled = voteHistory.length === 0;
  $('close-btn').disabled = sessionTotal === 0;
}

function finishVote() {
  if (sessionTotal === 0 || isClosed) return;
  isClosed = true;
  $('undo-btn').disabled = true;
  $('close-btn').disabled = true;

  for (let i = 0; i < N; i++) globalVotes[i] += sessionVotes[i];
  globalTotal += sessionTotal;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(globalVotes));
  setTimeout(buildResult, 400);
}

function animateValue(el, end, duration, suffix, onComplete) {
  if (!el) return;
  let t0 = null;
  const step = ts => {
    if (!t0) t0 = ts;
    const p = Math.min((ts - t0) / duration, 1);
    el.textContent = Math.floor((1 - Math.pow(1 - p, 3)) * end) + suffix;
    if (p < 1) requestAnimationFrame(step); 
    else { el.textContent = end + suffix; if (onComplete) onComplete(); }
  };
  requestAnimationFrame(step);
}

function buildResult() {
  $('r-title').textContent = QUESTION.title;
  $('r-total').textContent = globalTotal.toLocaleString();
  $('result-stage').innerHTML = '';
  buildStage($('result-stage'), 'result');
  scr('s-result');
  startTimer();

  const maxV = Math.max(...globalVotes);
  const sv = [...globalVotes].filter(v => v > 0).sort((a, b) => b - a);
  const r1 = sv[0]||0, r2 = sv.find(v=>v<r1)||0, r3 = sv.find(v=>v<r2)||0;
  const rc = {[r1]:'rank-1',[r2]:'rank-2',[r3]:'rank-3'};
  const cm = {[r1]:'🥇',[r2]:'🥈',[r3]:'🥉'};

  setTimeout(() => {
    SE.graph();
    for (let i = 0; i < N; i++) {
      const pct = globalTotal > 0 ? Math.round(globalVotes[i] / globalTotal * 100) : 0;
      const res = $('res-' + i);
      res.classList.add('show');
      if (globalVotes[i] > 0 && rc[globalVotes[i]]) {
        // 1〜3位：メダル＋%
        res.classList.add(rc[globalVotes[i]]);
        const medal = document.createElement('span');
        medal.className = 'zone-medal';
        medal.textContent = cm[globalVotes[i]];
        const pctEl = document.createElement('span');
        pctEl.className = 'pct';
        let popC = globalVotes[i] === r1 ? '#FFD700' : globalVotes[i] === r2 ? '#C0C0C0' : '#CD7F32';
        pctEl.style.setProperty('--pop-c', popC);
        res.appendChild(medal);
        res.appendChild(pctEl);
        animateValue(pctEl, pct, 2000, '%', () => {
          pctEl.classList.remove('pop'); void pctEl.offsetWidth; pctEl.classList.add('pop');
        });
      } else {
        // ランク外 or 0票：%のみ
        const pctEl = document.createElement('span');
        pctEl.className = 'pct';
        pctEl.style.setProperty('--pop-c', 'var(--accent)');
        res.appendChild(pctEl);
        animateValue(pctEl, pct, 2000, '%', () => {
          pctEl.classList.remove('pop'); void pctEl.offsetWidth; pctEl.classList.add('pop');
        });
      }
    }
    setTimeout(() => { SE.bell(); }, 2100);
  }, 300);

  let winnerIdx = globalVotes.indexOf(maxV);
  if (winnerIdx < 0) winnerIdx = 0;
  buildVoice(winnerIdx);

  const popup = $('rank1-popup');
  popup.classList.remove('show');
  setTimeout(() => {
    const stage = $('result-stage');
    const sr = stage.getBoundingClientRect();
    const cr = stage.closest('.card').getBoundingClientRect();
    const seat = SEATS[winnerIdx];
    const zL = sr.left - cr.left + (seat.left / 100) * sr.width;
    const zW = (seat.width / 100) * sr.width;
    const zT = sr.top - cr.top + (seat.top / 100) * sr.height;
    const pw = popup.offsetWidth || 220;
    let left = zL + zW / 2 - pw / 2;
    left = Math.max(4, Math.min(left, cr.width - pw - 4));
    popup.style.left = left + 'px';
    popup.style.top = (zT - popup.offsetHeight - 14) + 'px';
    popup.classList.add('show');
  }, 2600);
}

function buildVoice(winnerIdx) {
  $('voice-title').textContent = '1位を選んだ人の声';
  const box = $('voice-bubbles');
  box.innerHTML = '';
  SEATS[winnerIdx].voices.slice(0, 4).forEach(t => {
    box.innerHTML += `<div class="bubble">${t}</div>`;
  });
}

function showVoice() {
  scr('s-voice');
  stopTimer();
  const bar = $('timeout-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  setTimeout(() => { bar.style.transition = 'width 10s linear'; bar.style.width = '100%'; }, 50);
  timeoutId = setTimeout(resetAll, 10000);
  const btn = document.querySelector('.back-btn');
  btn.classList.remove('show');
  setTimeout(() => btn.classList.add('show'), 1500);
}

function startTimer() {
  clearTimeout(timeoutId);
  const bar = $('timeout-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  setTimeout(() => { bar.style.transition = `width ${TIMEOUT_SEC}s linear`; bar.style.width = '100%'; }, 50);
  timeoutId = setTimeout(resetAll, TIMEOUT_SEC * 1000);
}
function stopTimer() {
  clearTimeout(timeoutId);
  const bar = $('timeout-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
}
function resetAll() {
  sessionVotes = Array(N).fill(0); sessionTotal = 0; voteHistory = [];
  isClosed = false;
  stopTimer(); init(); scr('s-vote');
}
function init() {
  loadGlobalData();
  $('q-title').textContent = QUESTION.title;
  $('vote-stage').innerHTML = '';
  buildStage($('vote-stage'), 'vote');
  renderLiveCounts();
  updateStatus();
}
init();
</script>
<script>
/* NOZOOM-INJECTED */
/* ピンチイン/アウト・ダブルタップ・Ctrl+ホイールによるズームを無効化（iOS Safari対応） */
(function(){
  ['gesturestart','gesturechange','gestureend'].forEach(function(t){
    document.addEventListener(t, function(e){ e.preventDefault(); }, { passive:false });
  });
  document.addEventListener('touchmove', function(e){
    if (e.touches && e.touches.length > 1) e.preventDefault();
  }, { passive:false });
  var lastTouch = 0;
  document.addEventListener('touchend', function(e){
    var now = Date.now();
    if (now - lastTouch <= 300) e.preventDefault();
    lastTouch = now;
  }, { passive:false });
  document.addEventListener('wheel', function(e){
    if (e.ctrlKey) e.preventDefault();
  }, { passive:false });
  document.addEventListener('keydown', function(e){
    if ((e.ctrlKey || e.metaKey) && ['+','-','=','0'].indexOf(e.key) !== -1) e.preventDefault();
  });
})();
</script>
