<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票 - ロッカー20択版</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f4f6f9; --card-bg: #fff; --text: #2c3e50; --text-light: #64748b;
  --muted: #cbd5e1; --accent: #ec407a;
  --shadow: 0 10px 40px rgba(0,0,0,0.06);
}
body {
  font-family: 'Noto Sans JP', sans-serif; background: var(--bg);
  min-height: 100vh; display: flex; align-items: center; justify-content: center;
  touch-action: manipulation; -webkit-user-select: none; user-select: none;
}
.wrap { width: 100vw; max-width: 100vw; aspect-ratio: 16/9; max-height: 100vh; padding: 1.5vw; }
.card {
  background: var(--card-bg); width: 100%; height: 100%;
  border-radius: 24px; box-shadow: var(--shadow); padding: 2% 3%;
  display: flex; flex-direction: column; position: relative; overflow: hidden;
}
.screen { display: none; flex-direction: column; flex: 1; width: 100%; height: 100%; opacity: 0; transition: opacity 0.4s; }
.screen.show { display: flex; opacity: 1; }

.q-head { text-align: center; }
.q-number { font-size: clamp(12px, 1.5vw, 20px); font-weight: 900; color: var(--muted); letter-spacing: 0.1em; }
.q-sub { font-size: clamp(11px, 1.4vw, 18px); font-weight: 700; color: var(--text-light); margin-top: 0.5vh; }
.q-title { font-size: clamp(18px, 2.6vw, 36px); font-weight: 900; color: var(--text); line-height: 1.25; white-space: pre-line; margin-top: 0.5vh; position: relative; top: -3pt; }

/* ── 画像＋タップ領域 ── */
.locker-stage-wrap { flex: 1; display: flex; align-items: center; justify-content: center; min-height: 0; padding: 1vh 0; }
.locker-stage { position: relative; height: 100%; max-width: 100%; aspect-ratio: var(--img-ratio, 16/9); }
.locker-img { width: 100%; height: 100%; object-fit: contain; display: block; border-radius: 12px; position: relative; top: 5pt; }
.locker-stage.result-mode .locker-img { opacity: 0.35; }
.locker-fallback {
  width: 100%; height: 100%; border-radius: 12px;
  background: linear-gradient(#9aa7b5, #7e8c9c); padding: 1.5%;
  display: grid; gap: 1.2%;
}
.locker-fallback .door { background: #c7d0da; border: 2px solid #8d99a8; border-radius: 4px; position: relative; }
.locker-fallback .door::after { content:''; position:absolute; right:8%; top:45%; width:10%; height:10%; background:#6b7785; border-radius:2px; }
.locker-stage.result-mode .locker-fallback { opacity: 0.35; }

.tap-grid { position: absolute; inset: 0; }
.tap-zone {
  position: absolute; border: none; background: transparent; cursor: pointer;
  -webkit-tap-highlight-color: transparent; border-radius: 6px;
  display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4%;
}
.tap-zone:active { background: rgba(255,255,255,0.25); }
.tap-zone.flash { background: rgba(236,64,122,0.35); box-shadow: inset 0 0 0 3px var(--accent); }
.zone-num { display: none; 
  position: absolute; top: 4%; left: 6%;
  font-size: clamp(9px, 1vw, 14px); font-weight: 900; color: rgba(255,255,255,0.85);
  text-shadow: 0 1px 3px rgba(0,0,0,0.5); pointer-events: none;
}
.zone-badge {
  min-width: 1.8em; padding: 0.1em 0.35em; border-radius: 99px;
  background: var(--accent); color: #fff; font-weight: 900;
  font-size: clamp(11px, 1.4vw, 20px); text-align: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.25);
  opacity: 0; transform: scale(0.5); transition: 0.15s; pointer-events: none;
}
.zone-badge.on { opacity: 1; transform: scale(1); }

/* 結果オーバーレイ（各ロッカー上） */
.zone-result {
  position: absolute; inset: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0.2vh;
  pointer-events: none; opacity: 0; transform: scale(0.7);
  transition: opacity 0.5s, transform 0.5s cubic-bezier(0.2,0.8,0.2,1);
}
.zone-result.show { opacity: 1; transform: scale(1); }
.zone-result .pct { font-size: clamp(13px, 1.8vw, 28px); font-weight: 900; color: var(--text); text-shadow: 0 1px 0 #fff, 0 0 6px #fff; font-variant-numeric: tabular-nums; }
.zone-result .cnt { display: none; }
.zone-result.winner .pct { color: var(--accent); }
.zone-result.rank-1 { box-shadow: inset 0 0 0 3px #FFD700; border-radius: 6px; }
.zone-result.rank-1 .pct { color: #B8860B; }
.zone-result.rank-2 { box-shadow: inset 0 0 0 3px #C0C0C0; border-radius: 6px; }
.zone-result.rank-2 .pct { color: #808080; }
.zone-result.rank-3 { box-shadow: inset 0 0 0 3px #CD7F32; border-radius: 6px; }
.zone-result.rank-3 .pct { color: #A0522D; }
.zone-result.rank-1 .fill > div { background: #FFD700; }
.zone-result.rank-2 .fill > div { background: #C0C0C0; }
.zone-result.rank-3 .fill > div { background: #CD7F32; }
/* 数字が確定した瞬間の「ポップ」演出（参考HTMLと同じ） */
.zone-result .pct.pop { animation: pctPop 0.42s cubic-bezier(0.2, 0.8, 0.2, 1); }
@keyframes pctPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(1.4); color: var(--pop-c, var(--accent)); }
  100% { transform: scale(1); }
}
.zone-crown {
  position: absolute; top: 2%; left: 50%;
  transform: translateX(-50%);
  font-size: clamp(16px, 2.2vw, 32px);
  line-height: 1; pointer-events: none;
}
.zone-result .fill { display: none; }

/* ── 下部 ── */
.bottom-area { display: flex; align-items: center; justify-content: center; gap: 2vw; position: relative; min-height: 7vh; }
.live-counts { display: flex; gap: 1.5vw; align-items: center; justify-content: center; flex-wrap: wrap; }
.live-count-item {
  font-size: clamp(13px, 1.7vw, 24px); font-weight: 900; transition: transform 0.1s;
  display: flex; align-items: baseline; gap: 0.2em; color: var(--accent);
}
.live-count-item .v { color: var(--text); }
.live-count-item small { font-size: 0.6em; color: var(--text-light); }
.live-counts-empty { font-size: clamp(12px, 1.5vw, 20px); color: var(--muted); font-weight: 700; }

.undo-btn, .close-btn {
  position: absolute; bottom: 0; font-weight: 700; font-size: clamp(12px, 1.5vw, 20px);
  border: none; border-radius: 99px; padding: 1.2vh 2.5vw; cursor: pointer; transition: 0.2s; z-index: 10;
}
.undo-btn { left: 0; background: #f2f5f9; color: var(--text); }
.undo-btn:active { transform: scale(0.95); background: #e2e8f0; }
.close-btn { right: 0; background: var(--text); color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
.close-btn:active { transform: scale(0.95); }
.undo-btn:disabled, .close-btn:disabled { opacity: 0; pointer-events: none; }

/* 結果画面 */
.result-head { display: flex; align-items: baseline; justify-content: center; gap: 2vw; flex-wrap: wrap; }
#r-number { font-size: clamp(16px, 2.4vw, 32px); font-weight: 900; color: var(--text); letter-spacing: 0; white-space: pre-line; line-height: 1.25; position: relative; top: -3pt; }
.result-total { position: absolute; top: 4vh; left: 3vw; font-size: clamp(14px, 1.8vw, 24px); font-weight: 900; color: var(--text-light); }
.result-total b { color: var(--text); font-size: 1.3em; font-variant-numeric: tabular-nums; }
.reset-btn { position: absolute; top: 2vh; right: 2vw; background: #fff; border: 2px solid var(--text); color: var(--text); border-radius: 99px; padding: 1vh 2.2vw; font-weight: 700; font-size: clamp(12px, 1.5vw, 20px); cursor: pointer; z-index: 20; transform: scale(0.7); transform-origin: top right; transition: transform 0.15s; }
.reset-btn:active { transform: scale(0.672); }

.voice-btn-wrap { display: none; }

/* 1位ポップアップ */
.rank1-popup {
  position: absolute; opacity: 0; pointer-events: none;
  transition: opacity 0.4s, transform 0.4s;
  transform: translateY(6px);
  z-index: 30;
}
.rank1-popup.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
.rank1-popup-inner {
  background: #fff; border: 2px solid #FFD700;
  border-radius: 14px; padding: 0.8vh 1.4vw;
  box-shadow: 0 6px 20px rgba(0,0,0,0.15);
  display: flex; align-items: center; gap: 0.5em;
  font-size: clamp(11px, 1.3vw, 18px); font-weight: 700; color: var(--text);
  cursor: pointer; white-space: nowrap;
}
.rank1-popup-inner:active { transform: scale(0.97); }
.rank1-popup-arrow {
  position: absolute; bottom: -10px; left: 50%;
  transform: translateX(-50%);
  border-width: 10px 8px 0 8px; border-style: solid;
  border-color: #FFD700 transparent transparent transparent;
}
.rank1-popup-arrow::after {
  content: ''; position: absolute; top: -12px; left: -6px;
  border-width: 10px 6px 0 6px; border-style: solid;
  border-color: #fff transparent transparent transparent;
}

.voice-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; width: 100%; }
.voice-title { font-size: clamp(20px, 3vw, 40px); font-weight: 900; margin-bottom: 3vh; color: #f473a8; }
.voice-title b { color: #f473a8; }
.voice-content { display: flex; align-items: center; justify-content: center; gap: 4vw; width: 100%; }
.silhouette { flex-shrink: 0; width: clamp(80px, 12vw, 160px); }
.silhouette svg { width: 100%; height: auto; }
.bubbles { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5vw; flex: 1; max-width: 62%; }
.bubble { background: #f473a8; padding: 1.4vw 1.6vw; border-radius: 18px; font-weight: 700; font-size: clamp(13px, 1.6vw, 22px); line-height: 1.5; position: relative; color: #fff; }
.bubble::before { content: ''; position: absolute; top: 50%; left: -11px; transform: translateY(-50%); border-width: 8px 12px 8px 0; border-style: solid; border-color: transparent #f473a8 transparent transparent; }

.back-btn {
  margin-top: 5vh;
  background: #fff; color: #f473a8;
  border: 2px solid #f473a8; border-radius: 99px;
  padding: 1.4vh 3.5vw;
  font-size: clamp(13px, 1.6vw, 22px); font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, opacity 0.4s;
  text-align: center; line-height: 1.6;
  display: block; width: fit-content; margin-left: auto; margin-right: auto;
  opacity: 0; pointer-events: none;
}
.back-btn.show { opacity: 1; pointer-events: auto; }
.back-btn:active { transform: scale(0.96); box-shadow: 0 3px 10px rgba(0,0,0,0.15); }
.timeout-bar { height: 100%; width: 0%; background: var(--text-light); transition: width linear; opacity: 0.3; }
</style>
</head>
<body>
<div class="wrap"><div class="card">

  <div class="timeout-bar-wrap"><div class="timeout-bar" id="timeout-bar"></div></div>

  <!-- 1. 投票画面 -->
  <div class="screen show" id="s-vote">
    <div class="q-head">
      <p class="q-title" id="q-title"></p>
    </div>
    <div class="locker-stage-wrap">
      <div class="locker-stage" id="vote-stage"></div>
    </div>
    <div class="bottom-area">
      <button class="undo-btn" id="undo-btn" onclick="SE.vote();resetVote()" disabled>リセット</button>
      <div class="live-counts" id="live-counts"></div>
      <button class="close-btn" id="close-btn" onclick="SE.vote();finishVote()" disabled>結果を見る ➡</button>
    </div>
  </div>

  <!-- 2. 結果画面 -->
  <div class="screen" id="s-result">
    <button class="reset-btn" onclick="SE.vote();resetAll()">最初に戻る</button>
    <div class="result-head">
      <p class="q-number" id="r-number"></p>
    </div>
    <div class="locker-stage-wrap">
      <div class="locker-stage result-mode" id="result-stage"></div>
    </div>
    <p class="result-total">総投票数 <b id="r-total">0</b> 票</p>
    <!-- 1位ポップアップ（JSで位置を動的にセット） -->
    <div class="rank1-popup" id="rank1-popup" onclick="SE.vote();showVoice()">
      <div class="rank1-popup-inner">🥇 1位を選んだ人の声を見る</div>
      <div class="rank1-popup-arrow"></div>
    </div>
    <div class="voice-btn-wrap" id="voice-btn"></div>
  </div>

  <!-- 3. 最多の声画面 -->
  <div class="screen" id="s-voice">
    <div class="voice-layout">
      <div class="voice-title" id="voice-title">最多の声</div>
      <div class="voice-content">
        <div class="silhouette">
          <svg viewBox="0 0 120 150" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="60" cy="40" rx="29" ry="33" fill="#f473a8"/>
            <path d="M60,78 C36,78 19,92 13,116 C10,128 9,140 9,150 L111,150 C111,140 110,128 107,116 C101,92 84,78 60,78 Z" fill="#f473a8"/>
          </svg>
        </div>
        <div class="bubbles" id="voice-bubbles"></div>
      </div>
      <button class="back-btn" onclick="SE.vote();resetAll()">次の人のために最初の画面に戻る</button>
    </div>
  </div>

</div></div>

/* ===== 設定 ===== */
const MAX_VOTES = 10;
const TIMEOUT_SEC = 60;
const STORAGE_KEY = 'entaku_locker_votes_v1';
const QUESTION = { number: 'Q.07', title: '大浴場のロッカーどこ使う？' };

// 画像（同フォルダに置く。無ければ仮ロッカー表示）
const IMG_SRC = LOCKER_B64;
const IMG_RATIO = '1672/941';

// タップ領域グリッド：5列×4行＝20。画像内のロッカー群の位置に合わせ余白%で調整
const GRID_COLS = 10;
const GRID_ROWS = 2;
const PAD = { top: 25.8, right: 7.0, bottom: 9.8, left: 13.9 };  // 画像端→ロッカー群の余白(%)
const N = GRID_COLS * GRID_ROWS;

// 最多ロッカーの「声」。位置の傾向ごとに使い分け（端/中央/上段/下段）
const VOICE_BY_POSITION = {
  edge:   ["「端っこは人とぶつからなくて落ち着く」", "「隅のほうが荷物を広げやすい」", "「壁際だと着替えるとき視線が気にならない」", "「出入口から近くて動線がラク」"],
  center: ["「真ん中が一番場所を覚えやすい」", "「鏡やベンチに近くて便利」", "「なんとなく目に入ったから選んだ」", "「真ん中にいると見つけやすくて安心」"],
  top:    ["「上段は腰をかがめなくていい」", "「立ったまま荷物を出し入れできる」", "「目線の高さで鍵のかけ忘れがない」", "「下段は床に近くて使いにくい」"],
  bottom: ["「下段は重い荷物を持ち上げなくていい」", "「座りながら使えてラク」", "「上段は背が届かないから自然と下に」", "「荷物を直接床に置けるのが便利」"]
};

/* ===== SE エンジン（Web Audio API・外部ファイル不要） ===== */
const SE = (() => {
  let ctx = null;
  function ac() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }
  // 投票タップ：木琴っぽい温かいポン音
  function vote() {
    try {
      const c = ac(), t = c.currentTime;
      const o = c.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(660, t);
      o.frequency.exponentialRampToValueAtTime(880, t + 0.16);
      const f = c.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 3000;
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.35, t + 0.004);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
      o.connect(f); f.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + 0.2);
    } catch(e) {}
  }
  // 結果アニメ：高揚する上昇スウィープ（ウープ系）
  function graph() {
    try {
      const c = ac(), t = c.currentTime;
      const o = c.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(400, t);
      o.frequency.exponentialRampToValueAtTime(1600, t + 0.8);
      const g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.25, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + 0.85);
    } catch(e) {}
  }
  // 結果発表：お祝いのベル分散和音
  function bell() {
    try {
      const c = ac(), t = c.currentTime;
      const N = {C5:523.3, E5:659.3, G5:784, C6:1046.5};
      function _bell(freq, t0, dur, gain) {
        [1, 2.01, 3.0].forEach((r, i) => {
          const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = freq * r;
          const g = c.createGain();
          g.gain.setValueAtTime(0.0001, t0);
          g.gain.linearRampToValueAtTime(gain * [1, .5, .25][i], t0 + 0.005);
          g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur * [1, .7, .45][i]);
          o.connect(g); g.connect(c.destination);
          o.start(t0); o.stop(t0 + dur + 0.05);
        });
      }
      [N.C5, N.E5, N.G5, N.C6].forEach((f, i) => _bell(f, t + i * 0.11, 0.3, 0.14));
    } catch(e) {}
  }
  return { vote, graph, bell };
})();

/* ===== 状態 ===== */
let sessionVotes = Array(N).fill(0);
let sessionTotal = 0;
let voteHistory = [];
let globalVotes = Array(N).fill(0);
let globalTotal = 0;
let isClosed = false;
let timeoutId = null;

const $ = id => document.getElementById(id);
const scr = id => {
  document.querySelectorAll('.screen').forEach(s => {
    s.classList.remove('show');
    setTimeout(() => { if (!s.classList.contains('show')) s.style.display = 'none'; }, 300);
  });
  const t = $(id);
  t.style.display = 'flex';
  setTimeout(() => t.classList.add('show'), 50);
};

function loadGlobalData() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (Array.isArray(saved) && saved.length === N) globalVotes = saved;
  } catch(e) {}
  globalTotal = globalVotes.reduce((a, b) => a + b, 0);
}

/* ===== 画像 + ゾーン生成 ===== */
function zoneRect(i) {
  const col = i % GRID_COLS, row = Math.floor(i / GRID_COLS);
  const w = (100 - PAD.left - PAD.right) / GRID_COLS;
  const h = (100 - PAD.top - PAD.bottom) / GRID_ROWS;
  return { left: PAD.left + col * w, top: PAD.top + row * h, width: w, height: h };
}

function buildStage(container, mode) {
  container.style.setProperty('--img-ratio', IMG_RATIO);
  const img = document.createElement('img');
  img.className = 'locker-img';
  img.src = IMG_SRC;
  img.onerror = () => {  // 画像なし → 仮ロッカー
    img.remove();
    const fb = document.createElement('div');
    fb.className = 'locker-fallback';
    fb.style.gridTemplateColumns = `repeat(${GRID_COLS},1fr)`;
    fb.style.gridTemplateRows = `repeat(${GRID_ROWS},1fr)`;
    for (let i = 0; i < N; i++) fb.innerHTML += '<div class="door"></div>';
    container.prepend(fb);
  };
  container.appendChild(img);

  const grid = document.createElement('div');
  grid.className = 'tap-grid';
  for (let i = 0; i < N; i++) {
    const r = zoneRect(i);
    const z = document.createElement(mode === 'vote' ? 'button' : 'div');
    z.className = 'tap-zone';
    z.style.cssText = `left:${r.left}%;top:${r.top}%;width:${r.width}%;height:${r.height}%;`;
    if (mode === 'vote') {
      z.id = 'zone-' + i;
      z.innerHTML = `<span class="zone-num">${i + 1}</span><span class="zone-badge" id="badge-${i}">0</span>`;
      z.addEventListener('click', () => castVote(i));
    } else {
      z.style.pointerEvents = 'none';
      z.innerHTML = `<span class="zone-num">${i + 1}</span>
        <div class="zone-result" id="res-${i}">
          <span class="pct" id="res-pct-${i}">0%</span>
          <span class="cnt" id="res-cnt-${i}">0票</span>
          <div class="fill"><div id="res-fill-${i}"></div></div>
        </div>`;
    }
    grid.appendChild(z);
  }
  container.appendChild(grid);
}

/* ===== 投票 ===== */
function init() {
  loadGlobalData();
  $('q-title').innerHTML = QUESTION.title.replace('\n', '<br>');
  $('vote-stage').innerHTML = '';
  buildStage($('vote-stage'), 'vote');
  renderLiveCounts();
  updateStatus();
  stopTimer();
}

function renderLiveCounts() {
  const box = $('live-counts');
  const voted = [];
  sessionVotes.forEach((v, i) => { if (v > 0) voted.push(i); });
  if (voted.length === 0) {
    box.innerHTML = '<span class="live-counts-empty">ロッカーをタップして投票</span>';
    return;
  }
  box.innerHTML = voted.map(i =>
    `<span class="live-count-item" id="lc-${i}">No.${i + 1} <span class="v">${sessionVotes[i]}<small>票</small></span></span>`
  ).join('');
}

function castVote(i) {
  if (isClosed || sessionTotal >= MAX_VOTES) return;
  SE.vote();
  sessionVotes[i]++; sessionTotal++; voteHistory.push(i);

  const b = $('badge-' + i);
  b.textContent = sessionVotes[i];
  b.classList.add('on');

  const z = $('zone-' + i);
  z.classList.add('flash');
  setTimeout(() => z.classList.remove('flash'), 180);

  renderLiveCounts();
  const lc = $('lc-' + i);
  if (lc) { lc.style.transform = 'scale(1.25)'; setTimeout(() => lc.style.transform = 'scale(1)', 150); }

  updateStatus();
  if (sessionTotal >= MAX_VOTES) finishVote();
}

function resetVote() {
  if (sessionTotal === 0 || isClosed) return;
  // 全バッジをリセット
  for (let i = 0; i < N; i++) {
    if (sessionVotes[i] > 0) {
      const b = $('badge-' + i);
      b.textContent = 0;
      b.classList.remove('on');
    }
  }
  sessionVotes = Array(N).fill(0);
  sessionTotal = 0;
  voteHistory = [];
  renderLiveCounts();
  updateStatus();
}

function updateStatus() {
  $('undo-btn').disabled = sessionTotal === 0;
  $('close-btn').disabled = sessionTotal === 0;
}

function finishVote() {
  if (sessionTotal === 0) return;
  isClosed = true;
  $('undo-btn').disabled = true;
  $('close-btn').disabled = true;
  for (let i = 0; i < N; i++) globalVotes[i] += sessionVotes[i];
  globalTotal += sessionTotal;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(globalVotes));
  setTimeout(buildResult, 400);
}

/* ===== 結果 ===== */
function animateValue(el, end, duration, suffix, onComplete) {
  let t0 = null;
  const step = ts => {
    if (!t0) t0 = ts;
    const p = Math.min((ts - t0) / duration, 1);
    el.textContent = Math.floor((1 - Math.pow(1 - p, 3)) * end) + suffix;
    if (p < 1) requestAnimationFrame(step);
    else { el.textContent = end + suffix; if (onComplete) onComplete(); }
  };
  requestAnimationFrame(step);
}

function buildResult() {
  $('r-number').innerHTML = QUESTION.title.replace('\n', '<br>');
  $('r-total').textContent = globalTotal.toLocaleString();
  $('result-stage').innerHTML = '';
  buildStage($('result-stage'), 'result');

  scr('s-result');
  startTimer();

  const maxV = Math.max(...globalVotes);
  // TOP3のスコアを特定（同票考慮）
  const sortedVotes = [...globalVotes].filter(v => v > 0).sort((a, b) => b - a);
  const rank1V = sortedVotes[0] || 0;
  const rank2V = (sortedVotes.find(v => v < rank1V)) || 0;
  const rank3V = (sortedVotes.find(v => v < rank2V)) || 0;

  const crownMap = { [rank1V]: '🥇', [rank2V]: '🥈', [rank3V]: '🥉' };
  const rankClass = { [rank1V]: 'rank-1', [rank2V]: 'rank-2', [rank3V]: 'rank-3' };

  setTimeout(() => {
    SE.graph();
    for (let i = 0; i < N; i++) {
      const pct = globalTotal > 0 ? Math.round(globalVotes[i] / globalTotal * 100) : 0;
      const res = $('res-' + i);
      res.classList.add('show');
      if (globalVotes[i] === maxV && maxV > 0) res.classList.add('winner');
      // TOP3クラスと王冠
      if (globalVotes[i] > 0 && rankClass[globalVotes[i]]) {
        res.classList.add(rankClass[globalVotes[i]]);
        const crown = document.createElement('span');
        crown.className = 'zone-crown';
        crown.textContent = crownMap[globalVotes[i]];
        res.appendChild(crown);
      }
      // ポップ演出：確定色を設定して数字確定時に弾ませる
      const pctEl = $('res-pct-' + i);
      let popC = 'var(--accent)';
      if (globalVotes[i] > 0) {
        if (globalVotes[i] === rank1V) popC = '#FFD700';
        else if (globalVotes[i] === rank2V) popC = '#C0C0C0';
        else if (globalVotes[i] === rank3V) popC = '#CD7F32';
      }
      pctEl.style.setProperty('--pop-c', popC);
      animateValue(pctEl, pct, 2000, '%', () => {
        pctEl.classList.remove('pop');
        void pctEl.offsetWidth;
        pctEl.classList.add('pop');
      });
      animateValue($('res-cnt-' + i), globalVotes[i], 2000, '票');
      $('res-fill-' + i).style.width = pct + '%';
    }
    setTimeout(() => { SE.bell(); }, 2100);
  }, 300);

  let winnerIdx = globalVotes.indexOf(maxV);
  if (winnerIdx < 0) winnerIdx = 0;
  buildVoice(winnerIdx);

  // 2.5秒後に1位ポップアップを1位ロッカーの上に表示
  const popup = $('rank1-popup');
  popup.classList.remove('show');
  setTimeout(() => {
    const stage = $('result-stage');
    const stageRect = stage.getBoundingClientRect();
    const cardRect = stage.closest('.card').getBoundingClientRect();
    const r = zoneRect(winnerIdx);
    // ロッカーゾーンの中央x、上辺y を計算
    const zoneLeft = stageRect.left - cardRect.left + (r.left / 100) * stageRect.width;
    const zoneWidth = (r.width / 100) * stageRect.width;
    const zoneTop = stageRect.top - cardRect.top + (r.top / 100) * stageRect.height;
    const popupW = popup.offsetWidth || 200;
    let left = zoneLeft + zoneWidth / 2 - popupW / 2;
    // はみ出し補正
    const cardW = cardRect.width;
    left = Math.max(4, Math.min(left, cardW - popupW - 4));
    popup.style.left = left + 'px';
    popup.style.top = (zoneTop - popup.offsetHeight - 14) + 'px';
    popup.classList.add('show');
  }, 2600);
}

function showVoice() {
  scr('s-voice');
  // 声画面専用：10秒でリセット
  stopTimer();
  const bar = $('timeout-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  setTimeout(() => { bar.style.transition = 'width 10s linear'; bar.style.width = '100%'; }, 50);
  timeoutId = setTimeout(resetAll, 10000);
  const btn = document.querySelector('.back-btn');
  btn.classList.remove('show');
  setTimeout(() => btn.classList.add('show'), 1500);
}

function buildVoice(winnerIdx) {
  const num = winnerIdx + 1;
  $('voice-title').innerHTML = `1位を選んだ人の声`;
  const col = winnerIdx % GRID_COLS, row = Math.floor(winnerIdx / GRID_COLS);
  let key;
  if (col === 0 || col === GRID_COLS - 1) key = 'edge';
  else if (col >= 3 && col <= 6) key = 'center';
  else key = row === 0 ? 'top' : 'bottom';
  const box = $('voice-bubbles');
  box.innerHTML = '';
  VOICE_BY_POSITION[key].slice(0, 4).forEach(t => box.innerHTML += `<div class="bubble">${t}</div>`);
}

/* ===== タイマー・リセット ===== */
function startTimer() {
  clearTimeout(timeoutId);
  const bar = $('timeout-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
  setTimeout(() => { bar.style.transition = `width ${TIMEOUT_SEC}s linear`; bar.style.width = '100%'; }, 50);
  timeoutId = setTimeout(resetAll, TIMEOUT_SEC * 1000);
}
function stopTimer() {
  clearTimeout(timeoutId);
  const bar = $('timeout-bar');
  bar.style.transition = 'none'; bar.style.width = '0%';
}
function resetAll() {
  sessionVotes = Array(N).fill(0);
  sessionTotal = 0; voteHistory = []; isClosed = false;
  scr('s-vote');
  init();
}

init();
</script>
